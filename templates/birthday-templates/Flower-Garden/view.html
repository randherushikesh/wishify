<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>✦ Best Day of Your Life</title>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
            }
        }
    </script>

    <style>
        /* ... all styles unchanged, except we remove .floating-cta related rules ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; min-height: 100vh; background: #0a0a12; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; }
        .page.active { display: flex; }

        /* CURTAIN */
        #page-curtain {
            align-items: center; justify-content: center; flex-direction: column;
            background: radial-gradient(ellipse at center, #1a0e1e 0%, #0a0a12 70%);
            z-index: 100; text-align: center; padding: 24px;
        }
        #page-curtain .curtain-title {
            font-size: clamp(2.2rem, 8vw, 5rem); font-weight: 700; letter-spacing: 0.04em;
            background: linear-gradient(135deg, #f9d976, #f39f86, #df5b7a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            text-shadow: 0 0 60px rgba(223,91,122,0.2); line-height: 1.2; max-width: 800px;
        }
        #page-curtain .curtain-sub {
            font-size: clamp(1rem, 2.4vw, 1.6rem); font-weight: 300; color: rgba(255,255,255,0.5);
            letter-spacing: 0.2em; margin-top: 12px; margin-bottom: 40px;
        }
        #page-curtain .curtain-btn {
            background: linear-gradient(135deg, var(--accent, #f4c842), var(--accent-light, #e8506a));
            border: none; color: #1a0010; font-size: clamp(1.2rem, 2.6vw, 2rem); font-weight: 800;
            padding: 18px 56px; border-radius: 60px; cursor: pointer;
            transition: transform 0.25s, box-shadow 0.3s;
            box-shadow: 0 8px 32px rgba(232,80,106,0.35); letter-spacing: 0.06em;
            touch-action: manipulation; position: relative; z-index: 10;
        }
        #page-curtain .curtain-btn:hover { transform: scale(1.04); box-shadow: 0 12px 44px rgba(232,80,106,0.5); }
        #page-curtain .curtain-btn:active { transform: scale(0.95); }
        #page-curtain .sparkle {
            position: absolute; width: 6px; height: 6px; background: #f9d976; border-radius: 50%;
            box-shadow: 0 0 20px #f9d976; opacity: 0;
            animation: sparkleFloat 4s ease-in-out infinite; pointer-events: none;
        }
        @keyframes sparkleFloat {
            0%,100% { opacity:0; transform: translateY(0) scale(0.5); }
            25% { opacity:0.8; transform: translateY(-30px) scale(1.2); }
            75% { opacity:0.4; transform: translateY(-10px) scale(0.8); }
        }

        /* GALLERY */
        #page-gallery .gallery-container {
            width: 100%; height: 100%; position: relative;
        }
        #page-gallery .gallery-title {
            position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
            z-index: 10; font-size: clamp(14px, 2vw, 24px); font-weight: 300;
            letter-spacing: 0.3em; color: rgba(255,255,255,0.25); text-transform: uppercase;
            background: rgba(0,0,0,0.2); padding: 8px 24px; border-radius: 30px;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.03); white-space: nowrap;
        }
        #page-gallery .gallery-title span { color: rgba(255,255,255,0.5); font-weight: 400; }
        #page-gallery .gallery-counter {
            position: absolute; top: 28px; right: 30px; z-index: 10;
            font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.3);
            letter-spacing: 0.1em; background: rgba(0,0,0,0.2); padding: 6px 16px;
            border-radius: 20px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.04);
        }
        #page-gallery .gallery-counter span { color: rgba(255,255,255,0.6); font-weight: 400; }
        #page-gallery .gallery-btn {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 20; background: rgba(255,255,255,0.08); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.10); color: rgba(255,255,255,0.8);
            padding: 12px 32px; border-radius: 50px; font-size: clamp(14px, 1.6vw, 18px);
            font-weight: 400; letter-spacing: 0.06em; cursor: pointer; transition: all 0.3s ease;
            touch-action: manipulation; box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            text-transform: uppercase; white-space: nowrap;
        }
        #page-gallery .gallery-btn:hover {
            background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.2);
            color: #fff; transform: translateX(-50%) scale(1.03);
        }
        #page-gallery .gallery-btn:active { transform: translateX(-50%) scale(0.95); }
        #page-gallery .gallery-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(10,10,18,0.7) 100%);
        }
        #page-gallery #gallery-canvas-container { width: 100%; height: 100%; position: relative; }

        /* FLOWER */
        #page-flower {
            background: #030504; flex-direction: column; align-items: center; justify-content: center;
        }
        #page-flower #flower-canvas {
            display: block; width: 100%; height: 100%; touch-action: none;
        }
        #page-flower .flower-btn {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 20; background: rgba(255,255,255,0.08); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.10); color: rgba(255,255,255,0.8);
            padding: 12px 32px; border-radius: 50px; font-size: clamp(14px, 1.6vw, 18px);
            font-weight: 400; letter-spacing: 0.06em; cursor: pointer; transition: all 0.3s ease;
            touch-action: manipulation; box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            text-transform: uppercase; white-space: nowrap;
        }
        #page-flower .flower-btn:hover {
            background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.2);
            color: #fff; transform: translateX(-50%) scale(1.03);
        }
        #page-flower .flower-btn:active { transform: translateX(-50%) scale(0.95); }
        #page-flower .flower-instructions {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.3); font-family: 'Segoe UI', sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.2rem); letter-spacing: 1px;
            pointer-events: none; transition: opacity 1s ease; z-index: 2; text-align: center;
        }

        /* HEART */
        #page-heart {
            background: #000; transition: background 1.5s ease;
        }
        #page-heart .heart-container {
            width: 100%; height: 100%; position: relative;
        }
        #page-heart .heart-glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; mix-blend-mode: screen; opacity: 0.75;
            transition: background 1.5s ease; z-index: 2;
        }
        #page-heart .heart-text {
            position: absolute; z-index: 50;
            font-size: clamp(0.9rem, 3.2vw, 2.2rem); font-weight: 700;
            text-shadow: 0 0 30px rgba(255,100,150,0.5), 0 0 60px rgba(255,50,100,0.2);
            pointer-events: none; text-align: center; letter-spacing: 0.04em;
            opacity: 0; transition: opacity 1.5s ease;
            background: linear-gradient(45deg, #ff6b8a, #ff2d55, #ff9a76, #ffd93d);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            background-size: 300% 300%; animation: shimmerText 6s ease infinite;
            width: max-content; max-width: 200px; line-height: 1.3;
            padding: 0.1em 0.2em; left: 50%; top: 50%; transform: translate(-50%, -50%);
        }
        #page-heart .heart-text.show { opacity: 1; }
        #page-heart .heart-text .cursor {
            display: inline-block; width: 2px; height: 1em; background: #fff;
            margin-left: 2px; vertical-align: text-bottom; animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
        @keyframes shimmerText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #page-heart .heart-btn {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 20; background: rgba(255,255,255,0.08); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.10); color: rgba(255,255,255,0.8);
            padding: 12px 32px; border-radius: 50px; font-size: clamp(14px, 1.6vw, 18px);
            font-weight: 400; letter-spacing: 0.06em; cursor: pointer; transition: all 0.3s ease;
            touch-action: manipulation; box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            text-transform: uppercase; white-space: nowrap;
        }
        #page-heart .heart-btn:hover {
            background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.2);
            color: #fff; transform: translateX(-50%) scale(1.03);
        }
        #page-heart .heart-btn:active { transform: translateX(-50%) scale(0.95); }
        #page-heart #heart-canvas-container { width: 100%; height: 100%; position: relative; }

        /* WISH */
        #page-wish {
            background: #050508; align-items: center; justify-content: center; padding: 20px;
        }
        #page-wish .wish-card {
            position: relative; width: 100%; max-width: 500px; aspect-ratio: 1 / 1.45;
            background: radial-gradient(circle at center, #2c2d35 0%, #0d0e12 70%, #050508 100%);
            border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 40px; overflow: hidden;
        }
        #page-wish .wish-gold-frame {
            position: absolute; top: 25px; bottom: 25px; left: 25px; right: 25px;
            border: 3px solid transparent; border-image: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) 1;
            box-shadow: inset 0 0 15px rgba(170,119,28,0.2), 0 0 15px rgba(252,246,186,0.1);
            pointer-events: none; z-index: 5;
        }
        #page-wish .wish-decorations {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
        }
        #page-wish .wish-message-box {
            position: relative; z-index: 10; width: 100%; height: 60%; margin-top: 20%;
            padding: 0 10px; text-align: center; color: #ffffff;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
        }
        #page-wish .wish-heading {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            background: linear-gradient(to right, #fcf6ba, #bf953f, #fbf5b7, #aa771c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; letter-spacing: 2px; font-weight: normal;
            opacity: 0; transform: translateY(-10px);
            animation: fadeInDown 1s ease forwards 0.5s;
        }
        #page-wish .wish-text {
            font-size: clamp(0.95rem, 3.2vw, 1.2rem);
            line-height: 1.7; color: rgba(255,255,255,0.9);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); max-width: 90%; word-wrap: break-word;
        }
        #page-wish .wish-text .cursor {
            display: inline-block; width: 2px; height: 1.2rem;
            background-color: #fcf6ba; margin-left: 3px; vertical-align: middle;
            animation: blink 0.8s infinite;
        }
        @keyframes fadeInDown { to { opacity:1; transform: translateY(0); } }
        #page-wish .wish-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 20; background: rgba(255,255,255,0.08); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.10); color: rgba(255,255,255,0.8);
            padding: 12px 32px; border-radius: 50px; font-size: clamp(14px, 1.6vw, 18px);
            font-weight: 400; letter-spacing: 0.06em; cursor: pointer; transition: all 0.3s ease;
            touch-action: manipulation; box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            text-transform: uppercase; white-space: nowrap;
        }
        #page-wish .wish-btn:hover {
            background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.2);
            color: #fff; transform: translateX(-50%) scale(1.03);
        }
        #page-wish .wish-btn:active { transform: translateX(-50%) scale(0.95); }
        @media (max-width: 400px) {
            #page-wish .wish-card { padding: 25px; }
            #page-wish .wish-gold-frame { top: 15px; bottom: 15px; left: 15px; right: 15px; }
            #page-wish .wish-message-box { margin-top: 25%; }
        }

        /* audio toggle */
        #audio-toggle {
            position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 1000;
            width: 44px; height: 44px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(12,12,20,0.85); backdrop-filter: blur(8px);
            color: #f4c842; font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            transition: transform 0.2s, opacity 0.2s;
            display: none; align-items: center; justify-content: center; padding: 0;
        }
        #audio-toggle:hover { transform: scale(1.05); }
        .wish-text .cursor.hidden { display: none !important; }
    </style>
</head>

<body>

    <audio id="bg-music" loop preload="auto" style="display:none;"></audio>
    <button id="audio-toggle" onclick="toggleMute()">🔇</button>

    <!-- CURTAIN -->
    <div id="page-curtain" class="page active">
        <div class="curtain-title" id="curtainTitle">The best day of your life</div>
        <div class="curtain-sub" id="curtainSub">is waiting for you</div>
        <button class="curtain-btn" id="curtainBtn" onclick="goToPage('gallery')">Yes</button>
        <div class="sparkle" style="top:15%;left:12%;animation-delay:0.2s;"></div>
        <div class="sparkle" style="top:25%;right:18%;animation-delay:1.4s;"></div>
        <div class="sparkle" style="bottom:30%;left:8%;animation-delay:2.8s;"></div>
        <div class="sparkle" style="bottom:20%;right:10%;animation-delay:0.8s;"></div>
        <div class="sparkle" style="top:55%;left:5%;animation-delay:3.4s;"></div>
        <div class="sparkle" style="top:10%;left:50%;animation-delay:1.8s;"></div>
    </div>

    <!-- GALLERY -->
    <div id="page-gallery" class="page">
        <div class="gallery-container">
            <div class="gallery-vignette"></div>
            <div class="gallery-title" id="galleryTitle">✦ <span>wandering</span> gallery</div>
            <div class="gallery-counter"><span id="gallery-current">1</span> / <span id="gallery-total">0</span></div>
            <div id="gallery-canvas-container"></div>
            <button class="gallery-btn" id="galleryToFlowerBtn" onclick="goToPage('flower')">🌱 go to flower</button>
        </div>
    </div>

    <!-- FLOWER -->
    <div id="page-flower" class="page">
        <div class="flower-instructions" id="flowerInstructions">Tap anywhere to grow your garden</div>
        <canvas id="flower-canvas"></canvas>
        <button class="flower-btn" id="flowerToHeartBtn" onclick="goToPage('heart')">❤️ see heart</button>
    </div>

    <!-- HEART -->
    <div id="page-heart" class="page">
        <div class="heart-container">
            <div class="heart-glow" id="heartGlow"></div>
            <div id="heart-canvas-container"></div>
            <div class="heart-text" id="heartText">
                <span id="heartTyped"></span><span class="cursor"></span>
            </div>
            <button class="heart-btn" id="heartToWishBtn" onclick="goToPage('wish')">✨ last wish</button>
        </div>
    </div>

    <!-- WISH -->
    <div id="page-wish" class="page">
        <div class="wish-card">
            <div class="wish-gold-frame"></div>
            <svg class="wish-decorations" viewBox="0 0 400 580" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="wishGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#bf953f" />
                        <stop offset="25%" stop-color="#fcf6ba" />
                        <stop offset="50%" stop-color="#b38728" />
                        <stop offset="75%" stop-color="#fbf5b7" />
                        <stop offset="100%" stop-color="#aa771c" />
                    </linearGradient>
                    <radialGradient id="wishWhiteBalloon" cx="35%" cy="35%" r="60%">
                        <stop offset="0%" stop-color="#ffffff" />
                        <stop offset="70%" stop-color="#e6e1da" />
                        <stop offset="100%" stop-color="#a39e96" />
                    </radialGradient>
                    <radialGradient id="wishGoldBalloon" cx="35%" cy="35%" r="60%">
                        <stop offset="0%" stop-color="#fff9d6" />
                        <stop offset="40%" stop-color="#dfba6b" />
                        <stop offset="85%" stop-color="#9a7428" />
                        <stop offset="100%" stop-color="#5e4413" />
                    </radialGradient>
                    <g id="wishStar">
                        <polygon points="0,-7 2,-2 7,-2 3,1 5,6 0,3 -5,6 -3,1 -7,-2 -2,-2" fill="url(#wishGoldGrad)" />
                    </g>
                </defs>
                <line x1="60" y1="0" x2="60" y2="110" stroke="#7a5c18" stroke-width="0.7" />
                <use href="#wishStar" x="60" y="110" transform="scale(1.2)" />
                <line x1="180" y1="0" x2="180" y2="160" stroke="#7a5c18" stroke-width="0.7" />
                <use href="#wishStar" x="180" y="160" transform="scale(1.5)" />
                <line x1="320" y1="0" x2="320" y2="130" stroke="#7a5c18" stroke-width="0.7" />
                <use href="#wishStar" x="320" y="130" transform="scale(1.1)" />
                <circle cx="190" cy="20" r="28" fill="url(#wishWhiteBalloon)" opacity="0.6" />
                <circle cx="270" cy="30" r="32" fill="url(#wishWhiteBalloon)" opacity="0.8" />
                <g transform="translate(100, 90)">
                    <ellipse cx="0" cy="0" rx="30" ry="38" fill="url(#wishGoldBalloon)" />
                    <polygon points="0,38 -4,43 4,43" fill="#9a7428" />
                </g>
                <g transform="translate(55, 120)">
                    <ellipse cx="0" cy="0" rx="28" ry="35" fill="url(#wishGoldBalloon)" transform="rotate(-15)" />
                    <polygon points="0,35 -4,40 4,40" fill="#9a7428" transform="rotate(-15)" />
                </g>
                <g transform="translate(105, 170)">
                    <ellipse cx="0" cy="0" rx="27" ry="34" fill="url(#wishWhiteBalloon)" transform="rotate(10)" />
                    <polygon points="0,34 -4,39 4,39" fill="#a39e96" transform="rotate(10)" />
                </g>
                <g transform="translate(240, 100)">
                    <ellipse cx="0" cy="0" rx="32" ry="40" fill="url(#wishGoldBalloon)" transform="rotate(15)" />
                    <polygon points="0,40 -4,45 4,45" fill="#9a7428" transform="rotate(15)" />
                </g>
                <circle cx="120" cy="110" r="2" fill="#fff5b7" opacity="0.8" />
                <circle cx="140" cy="70" r="1.5" fill="#dfba6b" opacity="0.6" />
                <circle cx="165" cy="130" r="2.5" fill="#fff5b7" opacity="0.9" />
                <circle cx="210" cy="90" r="2" fill="#dfba6b" opacity="0.7" />
                <circle cx="290" cy="160" r="1.5" fill="#fff5b7" opacity="0.5" />
                <use href="#wishStar" x="145" y="125" transform="scale(0.8)" />
                <use href="#wishStar" x="225" y="105" transform="scale(1.3)" />
                <use href="#wishStar" x="255" y="155" transform="scale(0.7)" />
                <g fill="url(#wishGoldGrad)">
                    <circle cx="50" cy="520" r="2" />
                    <circle cx="65" cy="540" r="1.5" />
                    <circle cx="45" cy="550" r="3" opacity="0.7" />
                    <circle cx="80" cy="515" r="2" />
                    <circle cx="95" cy="535" r="1" />
                    <circle cx="120" cy="545" r="2.5" />
                    <circle cx="350" cy="510" r="1.5" />
                    <circle cx="335" cy="530" r="2.5" />
                    <circle cx="360" cy="545" r="2" />
                    <circle cx="310" cy="525" r="1" />
                    <circle cx="290" cy="540" r="3" opacity="0.6" />
                </g>
            </svg>
            <div class="wish-message-box">
                <h1 class="wish-heading" id="wishHeading">Happy Birthday!</h1>
                <p class="wish-text"><span id="wishTyped"></span><span class="cursor" id="wishCursor"></span></p>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================================
        // IMPORTS & DATA LOADING
        // ============================================================
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ── load data ──
        let pageData = null;
        let audioEl = document.getElementById('bg-music');
        let audioToggleBtn = document.getElementById('audio-toggle');

        // ── state flags for lazy init ──
        let galleryInitialized = false;
        let flowerInitialized = false;
        let heartInitialized = false;
        let wishTyped = false;
        let heartTyped = false;

        async function loadData() {
            const params = new URLSearchParams(window.location.search);
            let slug = params.get('slug');
            if (!slug) {
                const pathParts = window.location.pathname.split('/').filter(Boolean);
                if (pathParts.length >= 2) slug = pathParts[pathParts.length - 1];
            }
            if (!slug) {
                document.getElementById('page-curtain').innerHTML = '<p style="color:var(--accent);">No surprise found.</p>';
                return;
            }
            try {
                const res = await fetch('https://wishify.onrender.com/api/pages/' + slug);
                const result = await res.json();
                if (!result.success || !result.page || !result.page.data) throw new Error('Invalid data');
                pageData = result.page.data;
                applyData();
                initAudio();
                // show first page
                goToPage('curtain');
            } catch (err) {
                document.getElementById('page-curtain').innerHTML = '<p style="color:var(--accent);">Could not load the surprise.</p>';
                console.error(err);
            }
        }

        function applyData() {
            const d = pageData;
            const accent = d.colorAccent || '#f4c842';
            document.documentElement.style.setProperty('--accent', accent);
            document.documentElement.style.setProperty('--accent-light', accent);

            // Curtain
            document.getElementById('curtainTitle').textContent = d.curtainTitle || 'The best day of your life';
            document.getElementById('curtainSub').textContent = d.curtainSub || 'is waiting for you';
            document.getElementById('curtainBtn').textContent = d.curtainBtn || 'Yes';

            // Gallery
            document.getElementById('galleryTitle').innerHTML = d.galleryTitle || '✦ <span>wandering</span> gallery';
            document.getElementById('galleryToFlowerBtn').textContent = d.galleryBtn || '🌱 go to flower';

            // Flower
            document.getElementById('flowerInstructions').textContent = d.flowerInstructions || 'Tap anywhere to grow your garden';
            document.getElementById('flowerToHeartBtn').textContent = d.flowerBtn || '❤️ see heart';

            // Heart
            window._heartFullText = d.heartText || 'Happy Birthday Friend…';
            document.getElementById('heartToWishBtn').textContent = d.heartBtn || '✨ last wish';

            // Wish
            document.getElementById('wishHeading').textContent = d.wishHeading || 'Happy Birthday!';
            window._wishParagraph = d.wishParagraph || 'On this special day, I want to wish you a year filled with brilliant moments, endless laughter, and the strength to chase all your deepest dreams. May your path ahead be as bright and golden as today\'s celebration. Thank you for being such an incredible presence in my life. Cheers to you, your beautiful journey, and an unforgettable year ahead!';
            

            // Audio
            if (d.audioUrl) {
                audioEl.src = d.audioUrl;
                audioToggleBtn.style.display = 'flex';
            }

            // Gallery images (max 6)
            window._galleryImages = d.galleryImages || [];
        }

        // ─── AUDIO ───
        function initAudio() {
            if (!pageData || !pageData.audioUrl) return;
            audioEl.volume = 0.5;
            audioEl.play().then(() => { audioToggleBtn.textContent = '🔊'; }).catch(() => {
                audioToggleBtn.textContent = '🔇';
                document.addEventListener('click', function enable() {
                    audioEl.play().catch(()=>{});
                    audioToggleBtn.textContent = '🔊';
                    document.removeEventListener('click', enable);
                });
            });
        }

        window.toggleMute = function() {
            if (audioEl.muted) {
                audioEl.muted = false;
                if (audioEl.paused) audioEl.play().catch(()=>{});
                audioToggleBtn.textContent = '🔊';
            } else {
                if (audioEl.paused) {
                    audioEl.play().catch(()=>{});
                    audioToggleBtn.textContent = '🔊';
                } else {
                    audioEl.pause();
                    audioToggleBtn.textContent = '🔇';
                }
            }
        };

        // ─── PAGE NAVIGATION ───
        const pages = {
            curtain: document.getElementById('page-curtain'),
            gallery: document.getElementById('page-gallery'),
            flower: document.getElementById('page-flower'),
            heart: document.getElementById('page-heart'),
            wish: document.getElementById('page-wish'),
        };

        window.goToPage = function(name) {
            Object.keys(pages).forEach(key => {
                pages[key].classList.toggle('active', key === name);
            });
            // no floating CTA to toggle

            // init page content when first activated
            if (name === 'gallery' && !galleryInitialized) {
                initGallery();
                galleryInitialized = true;
            }
            if (name === 'flower' && !flowerInitialized) {
                initFlower();
                flowerInitialized = true;
            }
            if (name === 'heart' && !heartInitialized) {
                initHeart();
                heartInitialized = true;
            }
            if (name === 'wish' && !wishTyped) {
                wishTyped = true;
                setTimeout(typeWish, 500);
            }
            if (name === 'heart' && !heartTyped) {
                heartTyped = true;
                setTimeout(() => {
                    const el = document.getElementById('heartText');
                    if (el) el.classList.add('show');
                    setTimeout(typeHeart, 400);
                }, 500);
            }

            // resize / reflow
            setTimeout(() => {
                if (name === 'gallery' && window._galleryResize) window._galleryResize();
                if (name === 'heart' && window._heartResize) window._heartResize();
                if (name === 'flower' && window._flowerResize) window._flowerResize();
            }, 100);
        };

        // ============================================================
        // GALLERY (Three.js carousel)
        // ============================================================
        function initGallery() {
            const container = document.getElementById('gallery-canvas-container');
            if (!container) return;

            // Build image array from user data or fallback
            let userImages = window._galleryImages || [];
            const total = Math.max(userImages.length, 4);
            const imageUrls = [];
            if (userImages.length > 0) {
                for (let i = 0; i < total; i++) {
                    imageUrls.push(userImages[i]?.src || `https://picsum.photos/seed/${i+100}/600/400`);
                }
            } else {
                for (let i = 0; i < 24; i++) {
                    imageUrls.push(`https://picsum.photos/seed/${i+100}/600/400`);
                }
            }

            // ── Three.js setup ──
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a12);

            const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 0.5, 9);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.minDistance = 4;
            controls.maxDistance = 18;
            controls.maxPolarAngle = Math.PI * 0.45;
            controls.minPolarAngle = Math.PI * 0.08;
            controls.target.set(0, 0, 0);
            controls.enablePan = false;

            const composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(container.clientWidth, container.clientHeight),
                0.15, 0.4, 0.85
            );
            composer.addPass(bloomPass);
            composer.addPass(new OutputPass());

            // lights
            const ambient = new THREE.AmbientLight(0x404060, 0.6);
            scene.add(ambient);
            const dir = new THREE.DirectionalLight(0xffeedd, 2.0);
            dir.position.set(5, 8, 4);
            scene.add(dir);
            const fill = new THREE.DirectionalLight(0x4488ff, 0.5);
            fill.position.set(-4, -2, -6);
            scene.add(fill);
            const rim = new THREE.DirectionalLight(0xffdd88, 0.4);
            rim.position.set(-3, 5, -5);
            scene.add(rim);

            // particles
            const pCount = 400;
            const pGeo = new THREE.BufferGeometry();
            const pPos = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount; i++) {
                const r = 3 + Math.random() * 10;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                pPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
                pPos[i*3+1] = (Math.random() - 0.5) * 8;
                pPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            const pMat = new THREE.PointsMaterial({
                color: 0x6688bb,
                size: 0.035,
                transparent: true,
                opacity: 0.2,
                blending: THREE.AdditiveBlending
            });
            const particles = new THREE.Points(pGeo, pMat);
            scene.add(particles);

            // Cards
            const BG_SCALE = 0.5;
            const cards = [];
            let currentIndex = 0;
            let currentHeroCard = null;
            let isTransitioning = false;
            let timeSinceLastSwitch = 0;
            const SWITCH_INTERVAL = 4.0;
            let clock = new THREE.Clock();

            function generateWanderTarget() {
                const radius = 5 + Math.random() * 5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                return new THREE.Vector3(
                    radius * Math.sin(phi) * Math.cos(theta),
                    (Math.random() - 0.5) * 6,
                    radius * Math.sin(phi) * Math.sin(theta) - 1
                );
            }

            const loader = new THREE.TextureLoader();
            const texturePromises = imageUrls.map(url =>
                new Promise(resolve => loader.load(url, tex => resolve(tex), undefined, () => resolve(null)))
            );

            Promise.all(texturePromises).then(textures => {
                for (let i = 0; i < imageUrls.length; i++) {
                    const tex = textures[i];
                    const geo = new THREE.PlaneGeometry(2.2, 1.5);
                    const mat = new THREE.MeshStandardMaterial({
                        map: tex || undefined,
                        color: tex ? 0xffffff : 0x334466,
                        roughness: 0.2,
                        metalness: 0.05,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.6,
                        emissive: new THREE.Color(0x111122),
                        emissiveIntensity: 0.05,
                    });
                    const mesh = new THREE.Mesh(geo, mat);
                    const startPos = generateWanderTarget();
                    mesh.position.copy(startPos);
                    mesh.rotation.set(Math.random() * 0.5, Math.random() * 0.5, Math.random() * 0.5);
                    mesh.scale.set(BG_SCALE, BG_SCALE, BG_SCALE);
                    mesh.userData = {
                        index: i,
                        isHero: false,
                        wanderTarget: startPos.clone(),
                        wanderSpeed: 0.3 + Math.random() * 0.5
                    };
                    scene.add(mesh);

                    const borderGeo = new THREE.PlaneGeometry(2.28, 1.58);
                    const borderMat = new THREE.MeshBasicMaterial({
                        color: 0x5588bb,
                        transparent: true,
                        opacity: 0.0,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });
                    const border = new THREE.Mesh(borderGeo, borderMat);
                    border.position.copy(mesh.position);
                    border.rotation.copy(mesh.rotation);
                    border.scale.copy(mesh.scale);
                    scene.add(border);

                    cards.push({ mesh, border, material: mat, borderMat, index: i, isHero: false });
                }
                document.getElementById('gallery-total').textContent = cards.length;
                if (cards.length) setGalleryHero(0);
                animateGallery();
            });

            function setGalleryHero(index) {
                if (isTransitioning) return;
                index = ((index % cards.length) + cards.length) % cards.length;
                const newHero = cards[index];
                if (!newHero) return;
                if (currentHeroCard && currentHeroCard !== newHero) {
                    const old = currentHeroCard;
                    old.isHero = false;
                    old.mesh.userData.isHero = false;
                    old.mesh.userData.wanderTarget = generateWanderTarget();
                    old.borderMat.opacity = 0;
                }
                newHero.isHero = true;
                newHero.mesh.userData.isHero = true;
                currentHeroCard = newHero;
                currentIndex = index;
                document.getElementById('gallery-current').textContent = index + 1;
            }

            function nextHero() {
                if (isTransitioning) return;
                const nextIndex = (currentIndex + 1) % cards.length;
                setGalleryHero(nextIndex);
            }

            const canvas = renderer.domElement;
            canvas.addEventListener('click', nextHero);
            let touchStartX = 0, touchStartY = 0;
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }
            }, { passive: true });
            canvas.addEventListener('touchend', (e) => {
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(dx) < 20 && Math.abs(dy) < 20) nextHero();
            }, { passive: true });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') {
                    e.preventDefault();
                    nextHero();
                }
            });

            function animateGallery() {
                if (!cards.length) return;
                const delta = clock.getDelta();
                const elapsed = clock.getElapsedTime();

                timeSinceLastSwitch += delta;
                if (timeSinceLastSwitch >= SWITCH_INTERVAL) {
                    timeSinceLastSwitch = 0;
                    if (!isTransitioning) nextHero();
                }

                cards.forEach(card => {
                    const mesh = card.mesh, border = card.border, isHero = card.isHero;
                    if (isHero) {
                        const targetPos = new THREE.Vector3();
                        camera.getWorldDirection(targetPos);
                        targetPos.multiplyScalar(4.5).add(camera.position);
                        mesh.position.lerp(targetPos, 0.08);

                        const aspect = window.innerWidth / window.innerHeight;
                        let dynamicHeroScale = 1.6;
                        if (aspect < 1) {
                            const visibleHeight = 2 * 4.5 * Math.tan((camera.fov * Math.PI) / 360);
                            const visibleWidth = visibleHeight * aspect;
                            dynamicHeroScale = (visibleWidth * 0.85) / 2.2;
                            dynamicHeroScale = Math.max(0.65, Math.min(dynamicHeroScale, 1.2));
                        }
                        mesh.scale.lerp(new THREE.Vector3(dynamicHeroScale, dynamicHeroScale, dynamicHeroScale), 0.08);

                        const currentQuat = mesh.quaternion.clone();
                        mesh.lookAt(camera.position);
                        const targetQuat = mesh.quaternion.clone();
                        mesh.quaternion.copy(currentQuat);
                        mesh.quaternion.slerp(targetQuat, 0.08);

                        card.material.opacity += (1.0 - card.material.opacity) * 0.08;
                        card.material.emissiveIntensity += (0.15 - card.material.emissiveIntensity) * 0.08;
                        card.borderMat.opacity += (0.3 - card.borderMat.opacity) * 0.08;
                        border.scale.lerp(new THREE.Vector3(1.05, 1.05, 1.05), 0.08);
                    } else {
                        if (Math.random() < 0.005) mesh.userData.wanderTarget = generateWanderTarget();
                        const wanderTarget = mesh.userData.wanderTarget;
                        mesh.position.lerp(wanderTarget, 0.015 * mesh.userData.wanderSpeed);
                        mesh.rotation.x += (Math.random() - 0.5) * 0.01;
                        mesh.rotation.y += (Math.random() - 0.5) * 0.01;
                        mesh.rotation.z += (Math.random() - 0.5) * 0.01;
                        const targetScale = BG_SCALE + Math.sin(elapsed * 0.5 + card.index) * 0.05;
                        mesh.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.02);
                        card.material.opacity += (0.4 - card.material.opacity) * 0.02;
                        card.material.emissiveIntensity += (0.02 - card.material.emissiveIntensity) * 0.02;
                        card.borderMat.opacity += (0.0 - card.borderMat.opacity) * 0.05;
                        border.scale.lerp(new THREE.Vector3(1, 1, 1), 0.05);
                    }
                    border.position.copy(mesh.position);
                    border.quaternion.copy(mesh.quaternion);
                });

                particles.rotation.y += delta * 0.012;
                particles.rotation.x += delta * 0.004;
                controls.update();
                composer.render();
                requestAnimationFrame(animateGallery);
            }

            window._galleryResize = function() {
                const w = container.clientWidth, h = container.clientHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
                composer.setSize(w, h);
            };
            window.addEventListener('resize', window._galleryResize);
        }

        // ============================================================
        // FLOWER (Canvas)
        // ============================================================
        function initFlower() {
            const flowerCanvas = document.getElementById('flower-canvas');
            if (!flowerCanvas) return;
            const flowerCtx = flowerCanvas.getContext('2d');
            const flowerInstructions = document.getElementById('flowerInstructions');

            function random(min, max) { return Math.random() * (max - min) + min; }

            let flowerFlowers = [];
            let flowerGrassBlades = [];
            let flowerAnimId = null;

            function resizeFlower() {
                flowerCanvas.width = window.innerWidth;
                flowerCanvas.height = window.innerHeight;
                initFlowerGrass();
            }

            function initFlowerGrass() {
                flowerGrassBlades = [];
                const bladeCount = Math.floor(flowerCanvas.width / 2.5);
                for (let i = 0; i < bladeCount; i++) {
                    flowerGrassBlades.push({
                        x: random(0, flowerCanvas.width),
                        height: random(45, 90),
                        baseWidth: random(3, 6),
                        color: `hsl(${random(115, 145)}, ${random(55, 80)}%, ${random(12, 28)}%)`,
                        swaySpeed: random(0.001, 0.003),
                        swayOffset: random(0, Math.PI * 2),
                        curveDirection: random(-15, 15)
                    });
                }
                flowerGrassBlades.sort((a, b) => a.height - b.height);
            }

            window.addEventListener('resize', resizeFlower);
            resizeFlower();
            window._flowerResize = resizeFlower;

            class Flower {
                constructor(x, y) {
                    this.targetX = x;
                    this.targetY = y;
                    this.startX = x + random(-60, 60);
                    this.startY = flowerCanvas.height;
                    this.controlX = (this.startX + x) / 2 + random(-120, 120);
                    this.controlY = (this.startY + y) / 2 + random(-50, 50);
                    this.stemProgress = 0;
                    this.bloomProgress = 0;
                    this.isBlooming = false;
                    this.type = Math.floor(random(0, 3));
                    this.hue = random(0, 360);
                    this.layers = Math.floor(random(3, 6));
                    this.petalsPerLayer = Math.floor(random(6, 12));
                    this.maxSize = random(25, 50);
                }

                update() {
                    if (this.stemProgress < 1) {
                        this.stemProgress += 0.012;
                        if (this.stemProgress >= 1) {
                            this.stemProgress = 1;
                            this.isBlooming = true;
                        }
                    } else if (this.isBlooming && this.bloomProgress < 1) {
                        this.bloomProgress += 0.018;
                        if (this.bloomProgress > 1) this.bloomProgress = 1;
                    }
                }

                getQuadraticBezierXYatT(start, control, end, t) {
                    return Math.pow(1 - t, 2) * start + 2 * (1 - t) * t * control + Math.pow(t, 2) * end;
                }

                draw(ctx) {
                    const currentX = this.getQuadraticBezierXYatT(this.startX, this.controlX, this.targetX, this.stemProgress);
                    const currentY = this.getQuadraticBezierXYatT(this.startY, this.controlY, this.targetY, this.stemProgress);

                    ctx.beginPath();
                    ctx.moveTo(this.startX, this.startY);
                    ctx.quadraticCurveTo(
                        this.getQuadraticBezierXYatT(this.startX, this.controlX, this.controlX, this.stemProgress),
                        this.getQuadraticBezierXYatT(this.startY, this.controlY, this.controlY, this.stemProgress),
                        currentX, currentY
                    );
                    ctx.strokeStyle = `hsl(125, 50%, ${20 + (this.stemProgress * 15)}%)`;
                    ctx.lineWidth = 4.5;
                    ctx.lineCap = "round";
                    ctx.stroke();

                    if (this.stemProgress >= 1) {
                        ctx.save();
                        ctx.translate(this.targetX, this.targetY);
                        ctx.scale(this.bloomProgress, this.bloomProgress);

                        if (this.type === 0) this.drawDaisy(ctx);
                        else if (this.type === 1) this.drawLotus(ctx);
                        else this.drawRose(ctx);

                        ctx.restore();
                    }
                }

                drawDaisy(ctx) {
                    for (let layer = 0; layer < this.layers; layer++) {
                        const radius = this.maxSize - (layer * 7);
                        const petals = this.petalsPerLayer + layer;
                        const lightness = 45 + (layer * 8);
                        ctx.fillStyle = `hsl(${this.hue}, 85%, ${lightness}%)`;
                        for (let i = 0; i < petals; i++) {
                            ctx.rotate((Math.PI * 2) / petals);
                            ctx.beginPath();
                            ctx.ellipse(0, radius / 1.4, radius / 3.5, radius, 0, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    ctx.beginPath();
                    ctx.arc(0, 0, this.maxSize / 3, 0, Math.PI * 2);
                    ctx.fillStyle = `hsl(${this.hue + 40}, 95%, 45%)`;
                    ctx.fill();
                }

                drawLotus(ctx) {
                    for (let layer = 0; layer < this.layers; layer++) {
                        const radius = this.maxSize - (layer * 5);
                        const petals = 8 + layer;
                        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
                        gradient.addColorStop(0, `hsl(${this.hue}, 95%, 85%)`);
                        gradient.addColorStop(1, `hsl(${this.hue - 25}, 90%, 45%)`);
                        ctx.fillStyle = gradient;
                        for (let i = 0; i < petals; i++) {
                            ctx.rotate((Math.PI * 2) / petals);
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.quadraticCurveTo(radius / 1.8, radius / 1.8, 0, radius);
                            ctx.quadraticCurveTo(-radius / 1.8, radius / 1.8, 0, 0);
                            ctx.fill();
                        }
                    }
                    ctx.beginPath();
                    ctx.arc(0, 0, this.maxSize / 5, 0, Math.PI * 2);
                    ctx.fillStyle = "#FFD700";
                    ctx.fill();
                }

                drawRose(ctx) {
                    const totalPetals = this.layers * this.petalsPerLayer;
                    for (let i = totalPetals; i > 0; i--) {
                        const radius = (this.maxSize * (i / totalPetals)) + 6;
                        ctx.rotate(137.5 * (Math.PI / 180));
                        ctx.beginPath();
                        ctx.arc(0, radius / 1.6, radius, 0, Math.PI * 2);
                        ctx.fillStyle = `hsl(${this.hue}, 85%, ${25 + (i / totalPetals * 45)}%)`;
                        ctx.fill();
                        ctx.strokeStyle = `hsl(${this.hue}, 90%, 15%)`;
                        ctx.lineWidth = 0.4;
                        ctx.stroke();
                    }
                }
            }

            function drawFlowerGrass() {
                const time = Date.now();
                flowerGrassBlades.forEach(blade => {
                    const ctx = flowerCtx;
                    ctx.beginPath();
                    ctx.moveTo(blade.x, flowerCanvas.height);
                    const sway = Math.sin(time * blade.swaySpeed + blade.swayOffset) * 12;
                    ctx.quadraticCurveTo(
                        blade.x + blade.curveDirection, flowerCanvas.height - blade.height / 2,
                        blade.x + blade.curveDirection + sway, flowerCanvas.height - blade.height
                    );
                    ctx.strokeStyle = blade.color;
                    ctx.lineWidth = blade.baseWidth;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                });
            }

            function spawnFlower(e) {
                if (flowerInstructions) flowerInstructions.style.opacity = '0';
                const x = e.clientX;
                const y = e.clientY;
                if (x !== undefined && y !== undefined && y < flowerCanvas.height - 40) {
                    flowerFlowers.push(new Flower(x, y));
                }
            }

            flowerCanvas.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                spawnFlower(e);
            });

            function animateFlower() {
                if (!flowerCtx) return;
                flowerCtx.fillStyle = 'rgba(3, 5, 4, 0.25)';
                flowerCtx.fillRect(0, 0, flowerCanvas.width, flowerCanvas.height);

                flowerFlowers.forEach(flower => {
                    flower.update();
                    flower.draw(flowerCtx);
                });

                drawFlowerGrass();
                flowerAnimId = requestAnimationFrame(animateFlower);
            }

            animateFlower();
        }

        // ============================================================
        // HEART (Three.js particles)
        // ============================================================
        const heartState = {
            scene: null, camera: null, renderer: null, controls: null,
            composer: null, particles: null, time: 0,
            isAnimationEnabled: true, currentTheme: 'molten',
            initialized: false, clock: null,
            textShown: false, typedDone: false, charIndex: 0,
            fullText: 'Happy Birthday Friend…',
        };
        const heartThemes = {
            molten: {
                colors: [new THREE.Color(0xff4800), new THREE.Color(0xff8c00), new THREE.Color(0xd73a00), new THREE.Color(0x3d1005), new THREE.Color(0xffc600)],
                bloom: { strength: 0.35, radius: 0.45, threshold: 0.7 }
            },
            cosmic: {
                colors: [new THREE.Color(0x6a0dad), new THREE.Color(0x9370db), new THREE.Color(0x4b0082), new THREE.Color(0x8a2be2), new THREE.Color(0xdda0dd)],
                bloom: { strength: 0.4, radius: 0.5, threshold: 0.65 }
            },
            emerald: {
                colors: [new THREE.Color(0x00ff7f), new THREE.Color(0x3cb371), new THREE.Color(0x2e8b57), new THREE.Color(0x00fa9a), new THREE.Color(0x98fb98)],
                bloom: { strength: 0.3, radius: 0.6, threshold: 0.75 }
            }
        };

        function initHeart() {
            heartState.fullText = window._heartFullText || 'Happy Birthday Friend…';

            const container = document.getElementById('heart-canvas-container');
            if (!container) return;

            const scene = new THREE.Scene();
            heartState.scene = scene;

            const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1500);
            camera.position.z = getHeartCameraZ();
            heartState.camera = camera;

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);
            heartState.renderer = renderer;

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.04;
            controls.rotateSpeed = 0.3;
            controls.minDistance = 40;
            controls.maxDistance = 260;
            controls.enablePan = false;
            controls.target.set(0, -3, 0);
            heartState.controls = controls;

            const composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(container.clientWidth, container.clientHeight),
                1.5, 0.4, 0.85
            );
            composer.addPass(bloomPass);
            composer.addPass(new OutputPass());
            heartState.composer = composer;
            scene.userData.bloomPass = bloomPass;

            createHeartParticles();

            window.addEventListener('resize', onHeartResize);
            heartState.clock = new THREE.Clock();
            heartState.initialized = true;

            // theme cycling
            const themeKeys = Object.keys(heartThemes);
            let themeIdx = 0;
            setHeartTheme(themeKeys[0]);
            setInterval(() => {
                themeIdx = (themeIdx + 1) % themeKeys.length;
                setHeartTheme(themeKeys[themeIdx]);
            }, 8000);

            animateHeart();
        }

        function getHeartCameraZ() {
            return window.innerWidth < window.innerHeight ? 135 : 90;
        }

        function createHeartParticles() {
            const particleCount = 10000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            const heartPositions = new Float32Array(particleCount * 3);
            const disintegrationOffsets = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const t = (i / particleCount) * Math.PI * 2;
                const scale = 2.2;
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                const finalX = x * scale + (Math.random() - 0.5) * 0.2;
                const finalY = y * scale + (Math.random() - 0.5) * 0.2;
                const z = Math.sin(t * 4) * 2 + (Math.random() - 0.5) * 0.1;

                positions[i3] = finalX;
                positions[i3+1] = finalY;
                positions[i3+2] = z;
                heartPositions[i3] = finalX;
                heartPositions[i3+1] = finalY;
                heartPositions[i3+2] = z;

                const colorPalette = heartThemes.molten.colors;
                const colorProgress = (i / particleCount * colorPalette.length * 1.5) % colorPalette.length;
                const ci1 = Math.floor(colorProgress);
                const ci2 = (ci1 + 1) % colorPalette.length;
                const bf = colorProgress - ci1;
                const baseColor = new THREE.Color().lerpColors(colorPalette[ci1], colorPalette[ci2], bf);
                const color = baseColor.clone().multiplyScalar(0.65 + Math.random() * 0.55);
                colors[i3] = color.r;
                colors[i3+1] = color.g;
                colors[i3+2] = color.b;
                sizes[i] = 0.65 + Math.random() * 0.6;

                const offsetStrength = 30 + Math.random() * 40;
                const phi = Math.random() * Math.PI * 2;
                const theta = Math.acos(2 * Math.random() - 1);
                disintegrationOffsets[i3] = Math.sin(theta) * Math.cos(phi) * offsetStrength;
                disintegrationOffsets[i3+1] = Math.sin(theta) * Math.sin(phi) * offsetStrength;
                disintegrationOffsets[i3+2] = Math.cos(theta) * offsetStrength * 0.5;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('heartPosition', new THREE.BufferAttribute(heartPositions, 3));
            geometry.setAttribute('disintegrationOffset', new THREE.BufferAttribute(disintegrationOffsets, 3));

            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const cx = 32, cy = 32, or = 28, ir = 13;
            ctx.beginPath();
            ctx.moveTo(cx, cy - or);
            for (let i = 0; i < 5; i++) {
                const oa = (i / 5) * Math.PI * 2 - Math.PI / 2;
                ctx.lineTo(cx + or * Math.cos(oa), cy + or * Math.sin(oa));
                const ia = oa + Math.PI / 5;
                ctx.lineTo(cx + ir * Math.cos(ia), cy + ir * Math.sin(ia));
            }
            ctx.closePath();
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, or);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.3, 'rgba(255,255,220,0.9)');
            grad.addColorStop(0.6, 'rgba(255,200,150,0.6)');
            grad.addColorStop(1, 'rgba(255,150,0,0)');
            ctx.fillStyle = grad;
            ctx.fill();
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;

            const material = new THREE.PointsMaterial({
                size: 2.8,
                map: texture,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true,
                alphaTest: 0.01
            });

            const particles = new THREE.Points(geometry, material);
            heartState.scene.add(particles);
            heartState.particles = particles;
            heartState._particleCount = particleCount;
        }

        function animateHeartParticles() {
            if (!heartState.particles || !heartState.isAnimationEnabled) return;
            const pos = heartState.particles.geometry.attributes.position.array;
            const hPos = heartState.particles.geometry.attributes.heartPosition.array;
            const colors = heartState.particles.geometry.attributes.color.array;
            const sizes = heartState.particles.geometry.attributes.size.array;
            const off = heartState.particles.geometry.attributes.disintegrationOffset.array;
            const count = heartState._particleCount;
            const time = heartState.time;

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const homeX = hPos[i3], homeY = hPos[i3+1], homeZ = hPos[i3+2];
                const cycleTime = 20.0;
                const cycleOffset = (i / count) * cycleTime * 0.5;
                const cycleProgress = ((time * 0.6 + cycleOffset) % cycleTime) / cycleTime;
                let disAmount = 0;
                const stableEnd = 0.5, disStart = stableEnd, disFull = stableEnd + 0.15, holdEnd = disFull + 0.1;
                if (cycleProgress < stableEnd) disAmount = 0;
                else if (cycleProgress < disFull) disAmount = (cycleProgress - disStart) / (disFull - disStart);
                else if (cycleProgress < holdEnd) disAmount = 1.0;
                else disAmount = 1.0 - (cycleProgress - holdEnd) / (1.0 - holdEnd);
                disAmount = Math.sin(disAmount * Math.PI * 0.5);

                let targetX = homeX, targetY = homeY, targetZ = homeZ;
                let lerpFactor = 0.085;
                if (disAmount > 0.001) {
                    targetX = homeX + off[i3] * disAmount;
                    targetY = homeY + off[i3+1] * disAmount;
                    targetZ = homeZ + off[i3+2] * disAmount;
                    lerpFactor = 0.045 + disAmount * 0.02;
                }
                pos[i3] += (targetX - pos[i3]) * lerpFactor;
                pos[i3+1] += (targetY - pos[i3+1]) * lerpFactor;
                pos[i3+2] += (targetZ - pos[i3+2]) * lerpFactor;

                const palette = heartThemes[heartState.currentTheme].colors;
                const cp = (i / count * palette.length * 1.5 + time * 0.05) % palette.length;
                const ci1 = Math.floor(cp), ci2 = (ci1 + 1) % palette.length, bf = cp - ci1;
                const bc = new THREE.Color().lerpColors(palette[ci1], palette[ci2], bf);
                const brightness = (0.65 + Math.sin((i / count) * Math.PI * 7 + time * 1.3) * 0.35) * (1 - disAmount * 0.75) * (0.85 + Math.sin(time * 7 + i * 0.5) * 0.15);
                colors[i3] = bc.r * brightness;
                colors[i3+1] = bc.g * brightness;
                colors[i3+2] = bc.b * brightness;

                let sz = (0.65 + Math.random() * 0.6) * (1 - disAmount * 0.9);
                sz *= 0.8 + Math.sin(time * 5 + i * 0.3) * 0.2;
                sizes[i] = Math.max(0.05, sz);
            }
            heartState.particles.geometry.attributes.position.needsUpdate = true;
            heartState.particles.geometry.attributes.color.needsUpdate = true;
            heartState.particles.geometry.attributes.size.needsUpdate = true;
        }

        window.typeHeart = function() {
            const el = document.getElementById('heartTyped');
            if (!el) return;
            const full = heartState.fullText;
            if (heartState.charIndex < full.length) {
                el.textContent += full.charAt(heartState.charIndex);
                heartState.charIndex++;
                setTimeout(window.typeHeart, 120 + Math.random() * 80);
            } else {
                heartState.typedDone = true;
            }
        };

        function setHeartTheme(themeName) {
            if (!heartThemes[themeName]) return;
            heartState.currentTheme = themeName;
            const theme = heartThemes[themeName];
            const bloomPass = heartState.scene?.userData?.bloomPass;
            if (bloomPass) {
                bloomPass.strength = theme.bloom.strength;
                bloomPass.radius = theme.bloom.radius;
                bloomPass.threshold = theme.bloom.threshold;
            }
            const glow = document.getElementById('heartGlow');
            if (glow) {
                const bgMap = {
                    molten: 'radial-gradient(circle at 50% 50%, rgba(255,100,0,0.05) 0%, rgba(200,50,0,0.05) 50%, transparent 65%)',
                    cosmic: 'radial-gradient(circle at 50% 50%, rgba(147,112,219,0.05) 0%, rgba(75,0,130,0.05) 50%, transparent 65%)',
                    emerald: 'radial-gradient(circle at 50% 50%, rgba(0,255,127,0.05) 0%, rgba(46,139,87,0.05) 50%, transparent 65%)'
                };
                glow.style.background = bgMap[themeName] || bgMap.molten;
            }
            document.body.style.background =
                themeName === 'molten' ? 'linear-gradient(180deg, #000000 0%, #100500 50%, #1f0a00 100%)' :
                themeName === 'cosmic' ? 'linear-gradient(180deg, #000000 0%, #050010 50%, #0a001f 100%)' :
                'linear-gradient(180deg, #000000 0%, #001005 50%, #001f0a 100%)';
        }

        function animateHeart() {
            if (!heartState.initialized) return;
            heartState.time += 0.02;
            heartState.controls.update();

            if (heartState.isAnimationEnabled) {
                animateHeartParticles();
            }

            heartState.composer.render();
            requestAnimationFrame(animateHeart);
        }

        function onHeartResize() {
            if (!heartState.initialized) return;
            const container = document.getElementById('heart-canvas-container');
            if (!container) return;
            const w = container.clientWidth, h = container.clientHeight;
            heartState.camera.aspect = w / h;
            heartState.camera.updateProjectionMatrix();
            heartState.camera.position.z = getHeartCameraZ();
            heartState.renderer.setSize(w, h);
            heartState.composer.setSize(w, h);
        }
        window._heartResize = onHeartResize;

        // ============================================================
        // WISH (typewriter)
        // ============================================================
        let wishCharIndex = 0;
        let wishMessage = '';

        window.typeWish = function() {
            const el = document.getElementById('wishTyped');
            if (!el) return;
            wishMessage = window._wishParagraph || 'On this special day...';
            if (wishCharIndex < wishMessage.length) {
                el.textContent += wishMessage.charAt(wishCharIndex);
                wishCharIndex++;
                setTimeout(window.typeWish, 45);
            } else {
                const cursor = document.getElementById('wishCursor');
                if (cursor) cursor.classList.add('hidden');
            }
        };

        window.finishWish = function() {
            alert('🎉 Celebrate! You\'ve completed the journey. Happy Birthday! 🎂');
        };

        // ============================================================
        // START
        // ============================================================
        loadData();
    </script>
</body>
</html>
