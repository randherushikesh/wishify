<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Cinematic Birthday Surprise | For Someone Special</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --accent: #ff2d55;
      --accent-glow: rgba(255, 45, 85, 0.5);
      --gold: #d4af37;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --bg-dark: #0a0a0b;
      --royal-red: #6e0000;
      --bulb-warm: #ffde6b;
      --bulb-glow: rgba(255, 222, 107, 0.8);
    }

    /* --- Strict Layout Fixes --- */
    html,
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      width: 100%;
      height: 100%;
      background-color: var(--bg-dark);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      color: white;
      perspective: 1000px;
    }

    /* --- Main Container / Page Layout --- */
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      visibility: hidden;
      opacity: 0;
      transform: scale(1.1) translateZ(0);
      transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
      overflow: hidden;
    }

    .page.active {
      visibility: visible;
      opacity: 1;
      transform: scale(1) translateZ(0);
      z-index: 10;
    }

    /* --- Animations --- */
    @keyframes floatHeart {
      0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
      20% { opacity: 0.8; }
      100% { transform: translateY(-110vh) scale(1.5) rotate(360deg); opacity: 0; }
    }

    @keyframes neonPulse {
      0% { box-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent); }
      50% { box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
      100% { box-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent); }
    }

    @keyframes sparkle {
      0%,100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* --- Hero Page --- */
    #hero-page {
      background: radial-gradient(circle at center, #1a0a0c 0%, #050505 100%);
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      font-weight: 900;
      font-style: italic;
      background: linear-gradient(to right, #fff, var(--accent), #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 4s linear infinite;
      margin-bottom: 0.5rem;
    }
    @keyframes shine { to { background-position: 200% center; } }
    .hero-sub {
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 3rem;
    }
    .btn-neon {
      position: relative;
      padding: 18px 45px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      overflow: hidden;
      transition: 0.5s;
      animation: neonPulse 2s infinite;
    }
    .btn-neon:hover { background: var(--accent); color: #fff; box-shadow: 0 0 50px var(--accent); }

    /* --- SLIDER MESSAGE CARD --- */
    .slider-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      padding: 60px 40px;
      border-radius: 40px;
      border: 1px solid var(--glass-border);
      max-width: 500px;
      width: 90%;
      position: relative;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
    }
    .step-content {
      display: none;
      min-height: 120px;
      align-items: center;
      justify-content: center;
      animation: fadeInScale 0.8s forwards;
    }
    .step-content.active {
      display: flex;
      flex-direction: column;
    }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .step-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      margin-bottom: 30px;
      color: #fff;
      font-weight: 400;
    }
    .slider-dots {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 30px;
    }
    .dot {
      width: 8px; height: 8px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      transition: 0.4s;
    }
    .dot.active { background: var(--accent); transform: scale(1.5); box-shadow: 0 0 10px var(--accent-glow); }

    /* --- Celebration Page --- */
    #celebration-page {
      background: #000;
      transition: background 2s ease;
    }
    #celebration-page.bright {
      background: radial-gradient(circle at center, #2a0a0e 0%, #0a0a0b 100%);
    }

    /* --- FAIRY LIGHTS --- */
    .fairy-lights-container {
      position: absolute;
      top: 0;
      width: 100%;
      height: 150px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease;
      z-index: 5;
    }
    .wire-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      fill: none;
      stroke: #222;
      stroke-width: 2;
    }
    .bulb-teardrop {
      position: absolute;
      width: 16px;
      height: 24px;
      border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
      background: #444;
      transform-origin: top center;
      transform: translate(-50%, 0);
      box-shadow: none;
      transition: background 1s, box-shadow 1s;
    }
    .bright .bulb-teardrop {
      background: radial-gradient(circle at 30% 30%, #fff, var(--bulb-warm) 60%, #b8860b);
      box-shadow: 0 0 15px var(--bulb-glow), 0 0 30px var(--bulb-glow);
      animation: flicker var(--d) infinite alternate;
    }

    /* --- REALISTIC BALLOONS --- */
    .balloon {
      position: absolute;
      bottom: -200px;
      width: 60px;
      height: 80px;
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      z-index: 100;
      animation: balloonFloat 8s ease-in forwards;
      display: flex;
      justify-content: center;
    }
    .balloon::before {
      content: '';
      position: absolute;
      bottom: -5px;
      width: 10px;
      height: 6px;
      background: inherit;
      border-radius: 50%;
    }
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -100px;
      width: 1px;
      height: 100px;
      background: rgba(255, 255, 255, 0.3);
      transform-origin: top;
      animation: stringWobble 2s infinite ease-in-out;
    }
    .balloon-shine {
      position: absolute;
      top: 15%;
      left: 15%;
      width: 15px;
      height: 25px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      filter: blur(2px);
      transform: rotate(30deg);
    }
    @keyframes balloonFloat {
      0% { transform: translateY(0) translateX(0) rotate(0deg); }
      100% { transform: translateY(-130vh) translateX(0) rotate(0deg); opacity: 0; }
    }
    @keyframes stringWobble { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }

    /* --- Curtain Page --- */
    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }
    .curtain-panel {
      position: absolute;
      top: 0;
      width: 51%;
      height: 100%;
      background: repeating-linear-gradient(to right, var(--royal-red), #4a0000 10%);
      z-index: 20;
      transition: transform 2.5s cubic-bezier(0.645, 0.045, 0.355, 1);
      box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8);
    }
    .curtain-left { left: 0; border-right: 4px solid var(--gold); }
    .curtain-right { right: 0; border-left: 4px solid var(--gold); }
    .open .curtain-left { transform: translateX(-100%) skewY(-5deg); }
    .open .curtain-right { transform: translateX(100%) skewY(5deg); }

    .secret-content {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #1a1a1a, #000);
    }
    .message-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: clamp(20px, 5vw, 50px);
      border-radius: 30px;
      max-width: 700px;
      width: 90%;
      backdrop-filter: blur(10px);
      position: relative;
    }

    /* --- TYPING EFFECT STYLES --- */
    .typing-message {
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.8);
      text-align: left;
      min-height: 2.5em;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
    }
    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blinkCursor 0.8s step-end infinite;
      position: relative;
      top: 2px;
    }
    .typing-cursor.done {
      animation: blinkCursor 1.2s step-end infinite;
      background: rgba(255, 255, 255, 0.3);
    }
    @keyframes blinkCursor { 0%,100%{opacity:1} 50%{opacity:0} }

    /* --- MEMORY GALLERY FIXES --- */
    #gallery-page {
      background: #050505;
      overflow-y: auto;
      display: block;
      padding: 100px 20px;
      position: relative;
    }
    .gallery-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.5rem, 6vw, 4rem);
      color: var(--accent);
      text-align: center;
      margin-bottom: 60px;
      text-shadow: 0 0 20px var(--accent-glow);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .memory-card {
      position: relative;
      height: 400px;
      border-radius: 20px;
      overflow: hidden;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      cursor: pointer;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.6s;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .memory-card:hover {
      transform: translateY(-15px) scale(1.03);
      box-shadow: 0 20px 50px var(--accent-glow);
      border-color: var(--accent);
    }
    .memory-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s ease;
    }
    .memory-card:hover .memory-image { transform: scale(1.1); }
    .memory-hover-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      opacity: 0;
      transition: opacity 0.5s ease;
      backdrop-filter: blur(3px);
    }
    .memory-card:hover .memory-hover-overlay { opacity: 1; }
    .hover-message {
      font-family: 'Dancing Script', cursive;
      font-size: 1.8rem;
      color: #fff;
      text-align: center;
      line-height: 1.4;
      text-shadow: 0 0 15px var(--accent);
      transform: translateY(20px);
      transition: transform 0.5s ease;
    }
    .memory-card:hover .hover-message { transform: translateY(0); }

    .gallery-sparkle {
      position: absolute;
      pointer-events: none;
      background: white;
      border-radius: 50%;
      animation: sparkleAnim 2s infinite;
    }
    @keyframes sparkleAnim { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:0.8;transform:scale(1)} }

    @media (max-width: 600px) {
      .gallery-grid { grid-template-columns: 1fr; }
      .memory-card { height: 350px; }
    }

    /* ─── AUDIO TOGGLE ──────────────────────────────────────── */
    #audio-toggle {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      z-index: 1000;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(12,12,20,.85);
      backdrop-filter: blur(8px);
      color: #f4c842;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
      transition: transform .2s,opacity .2s;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
  </style>
</head>
<body>

  <!-- AUDIO TOGGLE -->
  <audio id="birthday-audio" loop style="display:none;"></audio>
  <button id="audio-toggle" onclick="toggleMute()">🔇</button>

  <!-- HERO -->
  <section id="hero-page" class="page active">
    <div id="particle-container" style="position: absolute; width: 100%; height: 100%; top:0; left:0; pointer-events: none;"></div>
    <h1 class="hero-title" id="hero-title">Happy Birthday, friend</h1>
    <p class="hero-sub" id="hero-sub">A Cinematic Journey Created Just For You</p>
    <button class="btn-neon" id="hero-btn" onclick="transitionTo('message-slider-page')">Open Your Gift</button>
  </section>

  <!-- SLIDER -->
  <section id="message-slider-page" class="page">
    <div id="slider-particles" style="position: absolute; width: 100%; height: 100%; top:0; left:0; pointer-events: none;"></div>
    <div class="slider-card">
      <div id="step-1" class="step-content active">
        <h2 class="step-text" id="slider-text-1">It's Your Special Day</h2>
        <button class="btn-neon" id="slider-btn-1" onclick="nextStep(2)">Next</button>
      </div>
      <div id="step-2" class="step-content">
        <h2 class="step-text" id="slider-text-2">Have a look</h2>
        <button class="btn-neon" id="slider-btn-2" onclick="nextStep(3)">Next</button>
      </div>
      <div id="step-3" class="step-content">
        <h2 class="step-text" id="slider-text-3">Ready for your surprise?</h2>
        <button class="btn-neon" id="slider-btn-3" onclick="finishSlider()">Let's Go</button>
      </div>
      <div class="slider-dots">
        <div id="dot-1" class="dot active"></div>
        <div id="dot-2" class="dot"></div>
        <div id="dot-3" class="dot"></div>
      </div>
    </div>
  </section>

  <!-- CELEBRATION -->
  <section id="celebration-page" class="page">
    <div class="fairy-lights-container" id="fairy-lights-container">
      <svg class="wire-svg" preserveAspectRatio="none" viewBox="0 0 1000 150">
        <path id="wire-path" d="M0,20 Q100,60 200,20 T400,20 T600,20 T800,20 T1000,20" />
      </svg>
    </div>
    <div style="background: transparent; border: none; box-shadow: none;">
      <h2 id="celeb-hint" style="font-size: 1.5rem; margin-bottom: 30px; letter-spacing: 2px;">The Stage is Set...</h2>
      <button id="celeb-master-btn" class="btn-neon" onclick="celebFlow()">💡 Turn On Lights</button>
    </div>
  </section>

  <!-- CURTAIN -->
  <section id="curtain-page" class="page" style="padding: 0;">
    <div class="stage" id="stage">
      <div class="curtain-panel curtain-left"></div>
      <div class="curtain-panel curtain-right"></div>
      <div class="secret-content">
        <div class="message-card" id="message-card">
          <h2 style="font-family: 'Dancing Script'; font-size: clamp(2rem, 5vw, 3.5rem); color: var(--accent); margin-bottom: 20px;">My Dearest friend,</h2>
          <div class="typing-message" id="typingMessage">
            <span class="typing-cursor"></span>
          </div>
          <button class="btn-neon" style="margin-top: 40px; animation: none; opacity: 0; pointer-events: none;" id="galleryBtn" onclick="transitionTo('gallery-page')">Our Memories</button>
        </div>
      </div>
    </div>
  </section>

  <!-- GALLERY -->
  <section id="gallery-page" class="page">
    <div id="gallery-bg-elements" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1;"></div>
    <h2 class="gallery-title" id="gallery-title">Moments in Time</h2>
    <div class="gallery-grid" id="gallery-grid"></div>
    <div style="text-align: center; padding: 100px 0;">
      <button class="btn-neon" onclick="location.reload()">Replay The Magic</button>
    </div>
  </section>

  <script>
    // ──────────────────────────────────────────────────────────────
    //  LOAD DATA FROM API
    // ──────────────────────────────────────────────────────────────

    var pageData = null;
    var audioEl = document.getElementById('birthday-audio');
    var audioToggleBtn = document.getElementById('audio-toggle');
    var apiBase = 'https://wishify.onrender.com'; // change if needed

    // ─── SLIDER STATE ──────────────────────────────────────────
    var sliderCurrent = 1;

    // ─── LOAD DATA ──────────────────────────────────────────────
    function loadData() {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      // clean URL: /cinematic/xyz
      if (!slug) {
        var pathParts = window.location.pathname.split('/').filter(Boolean);
        if (pathParts.length >= 2) {
          var folder = pathParts[pathParts.length - 2];
          if (folder === 'cinematic-surprise' || folder === 'surprise') {
            slug = pathParts[pathParts.length - 1];
          }
        }
      }
      console.log('🔍 Extracted slug:', slug);
      if (!slug) {
        document.getElementById('hero-page').innerHTML = '<p style="color:var(--accent);">No slug found.</p>';
        return;
      }

      var url = apiBase + '/api/pages/' + slug;
      fetch(url)
        .then(function(res) { return res.json(); })
        .then(function(result) {
          console.log('📦 API result:', result);
          if (!result.success || !result.page || !result.page.data) {
            throw new Error('Invalid data');
          }
          pageData = result.page.data;
          applyData();
          initAudio();
          initGallery();
          initFairyLights();
          // Start heart particles
          setInterval(function() { createHeart('particle-container'); }, 300);
          setInterval(function() { createHeart('slider-particles'); }, 400);
          // Gallery sparkles
          setInterval(function() {
            if (document.getElementById('gallery-page').classList.contains('active')) {
              spawnGallerySparkle();
            }
          }, 200);
        })
        .catch(function(err) {
          console.error('❌ Load error:', err);
          document.getElementById('hero-page').innerHTML = '<p style="color:var(--accent);">Could not load the surprise.</p>';
        });
    }

    // ─── APPLY DATA ─────────────────────────────────────────────
    function applyData() {
      var d = pageData;
      // Colors
      var accent = d.colorAccent || '#ff2d55';
      var gold = d.colorGold || '#d4af37';
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--gold', gold);
      document.documentElement.style.setProperty('--accent-glow', accent + '80');

      // Hero
      document.getElementById('hero-title').textContent = d.heroTitle || 'Happy Birthday, friend';
      document.getElementById('hero-sub').textContent = d.heroSub || 'A Cinematic Journey Created Just For You';
      document.getElementById('hero-btn').textContent = d.heroBtn || 'Open Your Gift';

      // Slider
      document.getElementById('slider-text-1').textContent = d.sliderStep1 || "It's Your Special Day";
      document.getElementById('slider-text-2').textContent = d.sliderStep2 || 'Have a look';
      document.getElementById('slider-text-3').textContent = d.sliderStep3 || 'Ready for your surprise?';
      document.getElementById('slider-btn-1').textContent = d.sliderBtn || 'Next';
      document.getElementById('slider-btn-2').textContent = d.sliderBtn || 'Next';
      document.getElementById('slider-btn-3').textContent = d.sliderFinalBtn || "Let's Go";

      // Celebration
      document.getElementById('celeb-hint').textContent = d.celebHint || 'The Stage is Set...';
      document.getElementById('celeb-master-btn').textContent = d.celebBtn1 || '💡 Turn On Lights';

      // Curtain
      window._curtainMsg = d.curtainMsg || "Today isn't just a date on the calendar; it's a celebration of the light you bring into my life. Every moment with you is like a frame from a beautiful movie, and I'm so lucky to be your co-star. May this year be filled with as much magic as you give to everyone around you.";
      document.getElementById('galleryBtn').textContent = d.curtainGalleryBtn || 'Our Memories';

      // Gallery
      document.getElementById('gallery-title').textContent = d.galleryTitle || 'Moments in Time';
      window._galleryItems = d.galleryItems || [];
    }

    // ─── AUDIO ──────────────────────────────────────────────────
    function initAudio() {
      if (!pageData || !pageData.audioUrl) return;
      audioEl.src = pageData.audioUrl;
      audioEl.volume = 0.5;
      audioToggleBtn.style.display = 'flex';
      audioEl.play().then(function() {
        audioToggleBtn.textContent = '🔊';
      }).catch(function() {
        audioToggleBtn.textContent = '🔇';
        document.addEventListener('click', function enable() {
          audioEl.play().catch(function(){});
          audioToggleBtn.textContent = '🔊';
          document.removeEventListener('click', enable);
        });
      });
    }

    function toggleMute() {
      if (audioEl.muted) {
        audioEl.muted = false;
        if (audioEl.paused) audioEl.play().catch(function(){});
        audioToggleBtn.textContent = '🔊';
      } else {
        if (audioEl.paused) {
          audioEl.play().catch(function(){});
          audioToggleBtn.textContent = '🔊';
        } else {
          audioEl.pause();
          audioToggleBtn.textContent = '🔇';
        }
      }
    }

    // ─── HEART PARTICLES ──────────────────────────────────────
    function createHeart(containerId) {
      var container = document.getElementById(containerId);
      if (!container) return;
      var heart = document.createElement('div');
      heart.style.position = 'absolute';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.bottom = '-10vh';
      heart.style.color = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#ff2d55';
      heart.innerHTML = '❤️';
      heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
      heart.style.animation = 'floatHeart ' + (Math.random() * 3 + 3) + 's linear forwards';
      container.appendChild(heart);
      setTimeout(function() { heart.remove(); }, 6000);
    }

    // ─── SLIDER ──────────────────────────────────────────────────
    function nextStep(step) {
      document.querySelectorAll('.step-content').forEach(function(s) { s.classList.remove('active'); });
      document.querySelectorAll('.dot').forEach(function(d) { d.classList.remove('active'); });
      document.getElementById('step-' + step).classList.add('active');
      document.getElementById('dot-' + step).classList.add('active');
      sliderCurrent = step;
    }

    function finishSlider() {
      transitionTo('celebration-page');
    }

    // ─── CELEBRATION FLOW ──────────────────────────────────────
    var celebStep = 1;

    function celebFlow() {
      var btn = document.getElementById('celeb-master-btn');
      var hint = document.getElementById('celeb-hint');
      var page = document.getElementById('celebration-page');
      var lights = document.getElementById('fairy-lights-container');

      if (celebStep === 1) {
        page.classList.add('bright');
        lights.style.opacity = '1';
        hint.innerText = "Music makes it better...";
        btn.innerText = pageData?.celebBtn2 || '🎵 Play Music';
        celebStep = 2;
      } else if (celebStep === 2) {
        audioEl.play().catch(function(){});
        hint.innerText = "Let the colors fly!";
        btn.innerText = pageData?.celebBtn3 || '🎈 Fly Balloons';
        celebStep = 3;
      } else if (celebStep === 3) {
        spawnBalloons(document.body);
        hint.innerText = "Almost there...";
        btn.innerText = pageData?.celebBtn4 || '✨ Show The Message';
        celebStep = 4;
      } else {
        transitionTo('curtain-page');
      }
    }

    // ─── BALLOONS ──────────────────────────────────────────────
    function spawnBalloons(target) {
      var colors = [
        ['#ff2d55','#800020'],
        ['#74b9ff','#0984e3'],
        ['#55efc4','#00b894'],
        ['#ffeaa7','#fdcb6e'],
        ['#a29bfe','#6c5ce7'],
        ['#ff9ff3','#f368e0']
      ];
      var interval = setInterval(function() {
        var b = document.createElement('div');
        b.classList.add('balloon');
        var shine = document.createElement('div');
        shine.classList.add('balloon-shine');
        var c = colors[Math.floor(Math.random() * colors.length)];
        b.style.left = Math.random() * 95 + 'vw';
        b.style.background = 'radial-gradient(circle at 70% 30%, ' + c[0] + ', ' + c[1] + ')';
        b.style.boxShadow = 'inset -10px -10px 20px rgba(0,0,0,0.3), 0 10px 30px rgba(0,0,0,0.2)';
        b.appendChild(shine);
        target.appendChild(b);
        setTimeout(function() { b.remove(); }, 8000);
      }, 400);
      setTimeout(function() { clearInterval(interval); }, 6000);
    }

    // ─── FAIRY LIGHTS ──────────────────────────────────────────
    function initFairyLights() {
      var container = document.getElementById('fairy-lights-container');
      var path = document.getElementById('wire-path');
      var pathLength = path.getTotalLength();
      var bulbCount = 25;
      for (var i = 0; i <= bulbCount; i++) {
        var distance = (i / bulbCount) * pathLength;
        var point = path.getPointAtLength(distance);
        var bulb = document.createElement('div');
        bulb.classList.add('bulb-teardrop');
        bulb.style.left = ((point.x / 1000) * 100) + '%';
        bulb.style.top = point.y + 'px';
        bulb.style.setProperty('--d', (0.5 + Math.random() * 2) + 's');
        container.appendChild(bulb);
      }
    }

    // ─── GALLERY ────────────────────────────────────────────────
    function initGallery() {
      var grid = document.getElementById('gallery-grid');
      grid.innerHTML = '';
      var items = window._galleryItems || [];
      items.forEach(function(item) {
        var card = document.createElement('div');
        card.className = 'memory-card';
        var imgHtml = item.src ?
          '<img class="memory-image" src="' + item.src + '" alt="memory" />' :
          '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1a1a;color:#555;font-size:40px;">📷</div>';
        card.innerHTML = imgHtml +
          '<div class="memory-hover-overlay"><p class="hover-message">' + (item.caption || 'Memory') + '</p></div>';
        grid.appendChild(card);
      });
      // if less than 6, fill with placeholders
      var fillCount = 6 - items.length;
      for (var i = 0; i < fillCount; i++) {
        var card = document.createElement('div');
        card.className = 'memory-card';
        card.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1a1a;color:#555;font-size:40px;">📷</div><div class="memory-hover-overlay"><p class="hover-message">Memory</p></div>';
        grid.appendChild(card);
      }
    }

    function spawnGallerySparkle() {
      var container = document.getElementById('gallery-bg-elements');
      var s = document.createElement('div');
      s.classList.add('gallery-sparkle');
      s.style.width = s.style.height = (Math.random() * 6 + 2) + 'px';
      s.style.top = Math.random() * 100 + '%';
      s.style.left = Math.random() * 100 + '%';
      container.appendChild(s);
      setTimeout(function() { s.remove(); }, 2000);
    }

    // ─── TYPING ENGINE ──────────────────────────────────────────
    var typingInterval = null;
    var typingCharIndex = 0;
    var isTypingComplete = false;
    var typingStarted = false;

    function startTypingEffect() {
      var container = document.getElementById('typingMessage');
      if (!container) return;
      if (typingStarted) return;
      typingStarted = true;

      var msg = window._curtainMsg || '';
      container.innerHTML = '<span class="typing-cursor"></span>';

      typingCharIndex = 0;
      isTypingComplete = false;

      var galleryBtn = document.getElementById('galleryBtn');
      galleryBtn.style.opacity = '0';
      galleryBtn.style.pointerEvents = 'none';

      typingInterval = setInterval(function() {
        if (typingCharIndex < msg.length) {
          var cursorSpan = container.querySelector('.typing-cursor');
          var char = msg[typingCharIndex];
          var textNode = document.createTextNode(char);
          container.insertBefore(textNode, cursorSpan);
          typingCharIndex++;
        } else {
          clearInterval(typingInterval);
          typingInterval = null;
          isTypingComplete = true;
          var cursorSpan2 = container.querySelector('.typing-cursor');
          if (cursorSpan2) cursorSpan2.classList.add('done');
          var galleryBtn2 = document.getElementById('galleryBtn');
          galleryBtn2.style.opacity = '1';
          galleryBtn2.style.pointerEvents = 'auto';
        }
      }, 35);
    }

    // ─── NAVIGATION ─────────────────────────────────────────────
    function transitionTo(pageId) {
      document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
      var target = document.getElementById(pageId);
      target.classList.add('active');

      if (pageId === 'curtain-page') {
        setTimeout(function() {
          document.getElementById('stage').classList.add('open');
          setTimeout(function() {
            startTypingEffect();
          }, 400);
        }, 800);
      }
      if (pageId === 'gallery-page') {
        initGallery();
      }
    }

    // ─── INIT ──────────────────────────────────────────────────
    loadData();
  </script>
</body>
</html>
