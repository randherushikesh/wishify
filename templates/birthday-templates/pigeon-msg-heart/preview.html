<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Surprise!</title>

    <!-- Swiper CSS for Gallery -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <!-- Fonts for Magic page -->
    <link rel="stylesheet" href="https://use.typekit.net/trt3ngp.css" />
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* ─── PAGE SECTIONS ─── */
        .page-section {
            display: none;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .page-section.active {
            display: block;
        }
        .page-section.active#page1,
        .page-section.active#page3 {
            display: flex;
        }

        /* ─── PAGE 1 ─── */
        #page1 {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
        }
        #page1 .container {
            text-align: center;
        }
        #page1 .message {
            font-size: 3rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 4px 15px rgba(0, 0, 0, 0.15);
            margin-bottom: 2.5rem;
            opacity: 0;
            transform: translateY(50px);
            animation: slideUpFade 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                float 3s ease-in-out infinite 1.2s;
        }
        #page1 .btn {
            background-color: #ffffff;
            color: #ff758c;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: scale(0.8);
            animation: popInBtn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.8s;
            transition: all 0.3s ease;
        }
        #page1 .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 20px rgba(255, 117, 140, 0.3);
            background-color: #ff758c;
            color: #ffffff;
        }

        /* ─── PAGE 2 ─── */
        #page2 {
            --sky-top: #8fc7e8;
            --sky-bottom: #e9f4fb;
            --paper: #fdf6e3;
            --envelope: #f1e4c8;
            --envelope-dark: #d8c49f;
            --envelope-light: #faf0e0;
            --twine: #b3452e;
            --ink: #3a3226;
            --confetti-1: #ff5d73;
            --confetti-2: #ffc857;
            --confetti-3: #4fd1a5;
            --confetti-4: #6c8cff;
            --confetti-5: #d76ef2;
        }
        #page2 .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 100%);
            overflow: hidden;
        }
        #page2 .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            filter: blur(1px);
            opacity: 0.9;
        }
        #page2 .cloud::before,
        #page2 .cloud::after {
            content: "";
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }
        #page2 .c1 {
            width: 110px;
            height: 40px;
            top: 12%;
            left: -20%;
            animation: driftCloud 26s linear infinite;
        }
        #page2 .c1::before {
            width: 60px;
            height: 60px;
            top: -25px;
            left: 15px;
        }
        #page2 .c1::after {
            width: 50px;
            height: 50px;
            top: -15px;
            left: 55px;
        }
        #page2 .c2 {
            width: 80px;
            height: 30px;
            top: 26%;
            left: -30%;
            animation: driftCloud 34s linear infinite;
            animation-delay: -8s;
        }
        #page2 .c2::before {
            width: 44px;
            height: 44px;
            top: -18px;
            left: 10px;
        }
        #page2 .c2::after {
            width: 36px;
            height: 36px;
            top: -12px;
            left: 40px;
        }
        #page2 .c3 {
            width: 140px;
            height: 46px;
            top: 6%;
            left: -40%;
            animation: driftCloud 40s linear infinite;
            animation-delay: -20s;
        }
        #page2 .c3::before {
            width: 70px;
            height: 70px;
            top: -30px;
            left: 20px;
        }
        #page2 .c3::after {
            width: 60px;
            height: 60px;
            top: -20px;
            left: 70px;
        }
        #page2 .pigeon-wrap {
            position: absolute;
            top: 12%;
            left: -220px;
            width: 160px;
            height: 100px;
            will-change: transform;
            transition: opacity 0.6s ease;
        }
        #page2 .pigeon-wrap svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }
        #page2 .wing {
            transform-origin: 88px 55px;
            animation: flap 0.45s ease-in-out infinite alternate;
        }
        #page2 .envelope-carried {
            position: absolute;
            left: 8px;
            top: 54px;
            width: 20px;
            height: 14px;
            transform: rotate(-14deg);
            transition: opacity 0.15s linear;
            z-index: 5;
        }
        #page2 .env-body {
            position: absolute;
            inset: 0;
            background: var(--envelope);
            border: 1.5px solid var(--envelope-dark);
            border-radius: 2px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        #page2 .env-flap {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 60%;
            background: var(--envelope-dark);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top center;
            transition: transform 0.6s cubic-bezier(0.6, -0.2, 0.3, 1.2);
            z-index: 3;
        }
        #page2 .env-flap.open {
            transform: rotateX(180deg);
            background: var(--envelope-light);
        }
        #page2 .env-seal {
            position: absolute;
            left: 50%;
            top: 38%;
            width: 14%;
            height: 14%;
            background: var(--twine);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.25) inset;
            z-index: 4;
            transition: opacity 0.3s ease;
        }
        #page2 .env-front-folds {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 49.3%, var(--envelope-dark) 50%),
                linear-gradient(-135deg, transparent 49.3%, var(--envelope-dark) 50%);
            opacity: 0.55;
            border-radius: 2px;
        }
        #page2 #envelopeFalling {
            z-index: 15;
        }
        #page2 #paper {
            z-index: 16;
        }
        #page2 #envelopeFront {
            z-index: 17;
            pointer-events: none;
        }
        #page2 .paper>* {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        #page2 .paper.text-show>* {
            opacity: 1;
            transform: translateY(0);
        }
        #page2 .envelope-falling {
            position: fixed;
            width: 50px;
            height: 36px;
            left: 0;
            top: 0;
            transform-origin: 0 0;
            transform: translate(-1000px, -1000px) scale(1);
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.25));
            will-change: transform, opacity;
        }
        #page2 .envelope-falling.visible {
            opacity: 1;
        }
        #page2 .envelope-falling.landed {
            cursor: pointer;
            pointer-events: auto;
            animation: invitePulse 1.6s ease-in-out infinite;
        }
        #page2 .envelope-falling.opened {
            animation: none;
            pointer-events: none;
        }
        #page2 .paper {
            position: fixed;
            left: 0;
            top: 0;
            transform-origin: 0 0;
            background: var(--paper);
            border-radius: 8px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
            padding: 5% 6%;
            text-align: center;
            opacity: 0;
            z-index: 16;
            pointer-events: none;
            overflow: hidden;
            transition: transform 1.5s cubic-bezier(0.2, 0.7, 0.25, 1),
                opacity 0.4s ease,
                width 1.5s cubic-bezier(0.2, 0.7, 0.25, 1),
                height 1.5s cubic-bezier(0.2, 0.7, 0.25, 1);
        }
        #page2 .paper.show {
            opacity: 1;
        }
        #page2 .paper h1 {
            margin: 0 0 3%;
            font-size: clamp(22px, 5vw, 42px);
            background: linear-gradient(90deg, var(--confetti-1), var(--confetti-2), var(--confetti-3), var(--confetti-4), var(--confetti-5));
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 4s linear infinite;
        }
        #page2 .paper p {
            margin: 0;
            color: var(--ink);
            font-size: clamp(13px, 2.6vw, 18px);
            line-height: 1.6;
        }
        #page2 .paper .sign {
            margin-top: 4%;
            font-style: italic;
            color: #7a6b4f;
            font-size: clamp(11px, 2.2vw, 15px);
        }
        #page2 .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            opacity: 0;
            z-index: 8;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        #page2 .overlay.show {
            opacity: 0.45;
        }
        #page2 .overlay.dark {
            opacity: 0.62;
        }
        #page2 .hint {
            position: fixed;
            left: 50%;
            bottom: 8%;
            transform: translateX(-50%);
            color: var(--ink);
            font-size: 15px;
            font-weight: 500;
            opacity: 0;
            letter-spacing: 0.5px;
            transition: opacity 0.5s ease;
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6);
            z-index: 16;
        }
        #page2 .hint.show {
            opacity: 0.9;
        }
        #page2 .confetti-piece {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 9px;
            height: 16px;
            z-index: 17;
            pointer-events: none;
            opacity: 0.95;
            border-radius: 2px;
        }

        /* ─── Gallery button on page 2 ─── */
        #page2 .gallery-btn {
            position: fixed;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            color: #ff758c;
            border: none;
            padding: 14px 36px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            z-index: 200;
            /* 👈 higher than floating CTA */
        }
        #page2 .gallery-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #page2 .gallery-btn:hover {
            transform: translateX(-50%) translateY(-3px) scale(1.05);
            box-shadow: 0 12px 25px rgba(255, 117, 140, 0.35);
            background-color: #ff758c;
            color: #ffffff;
        }

        /* ─── PAGE 3 ─── */
        #page3 {
            background-color: #0a0a0a;
            align-items: center;
            justify-content: center;
        }
        #page3 .swiper {
            width: 100%;
            height: 85vh;
            padding-top: 20px;
            padding-bottom: 40px;
        }
        #page3 .swiper-wrapper {
            transition-timing-function: cubic-bezier(0.23, 1, 0.32, 1) !important;
        }
        #page3 .swiper-slide {
            background-position: center;
            background-size: cover;
            width: 75vw;
            max-width: 320px;
            height: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }
        #page3 .swiper-pagination-bullet {
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        #page3 .swiper-pagination-bullet-active {
            background: #ffffff;
            transform: scale(1.3);
        }

        /* ─── Magic button on page 3 ─── */
        #page3 .magic-btn {
            position: fixed;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff758c, #ff9a9e);
            color: #ffffff;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 117, 140, 0.4);
            z-index: 200;
            /* 👈 higher than floating CTA */
            transition: all 0.3s ease;
        }
        #page3 .magic-btn:hover {
            transform: translateX(-50%) translateY(-3px) scale(1.05);
            box-shadow: 0 12px 30px rgba(255, 117, 140, 0.55);
        }

        /* ─── PAGE 4 ─── */
        #page4 {
            background: #16000a;
            overflow: hidden;
        }
        #page4 .webgl {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            outline: none;
        }
        #page4::before {
            content: "";
            position: absolute;
            border: 8px solid rgba(255, 255, 255, 0.12);
            inset: 1rem;
            z-index: 100;
            pointer-events: none;
            border-radius: 4px;
        }
        #page4 h1 {
            position: absolute;
            top: 10vh;
            left: 2.5rem;
            right: 1rem;
            text-align: center;
            font-family: ador-hairline, sans-serif;
            font-weight: 900;
            font-size: max(1rem, 3vh);
            z-index: 50;
            pointer-events: none;
            color: #ffdada;
            text-shadow: 0 0 40px rgba(255, 80, 180, 0.3);
        }
        #page4 #play-music {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            right: 0;
            margin: auto;
            width: 8vh;
            height: 8vh;
            cursor: pointer;
            z-index: 200;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 20px rgba(255, 80, 180, 0.4));
            background-image: url('https://picsum.photos/200');
            background-size: cover;
            background-position: center;
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z"/></svg>');
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z"/></svg>');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
        }
        #page4 #play-music:hover {
            transform: scale(1.1);
        }
        #page4 #play-music.zooming {
            animation: continuousZoom 1.5s infinite ease-in-out;
            transition: none;
        }

        /* ─── FLOATING CTA ─── */
        .floating-cta {
            position: fixed;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 50;
            /* 👈 lowered from 999 */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
        }
        .floating-cta a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #f4c842, #e8506a);
            color: #1a0010;
            font-family: 'Nunito', sans-serif;
            font-size: 0.72rem;
            font-weight: 800;
            text-decoration: none;
            padding: 1rem 0.6rem;
            border-radius: 50px;
            box-shadow: 0 8px 24px rgba(244, 200, 66, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            writing-mode: vertical-rl;
            letter-spacing: 0.05em;
            min-width: 44px;
            text-align: center;
        }
        .floating-cta a:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(244, 200, 66, 0.45);
        }
        .floating-cta .cta-icon {
            font-size: 1.1rem;
            writing-mode: horizontal-tb;
        }
        .floating-cta .back-btn {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.65rem;
            padding: 0.6rem 0.5rem;
            border-radius: 50px;
            text-decoration: none;
            writing-mode: vertical-rl;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.2s, color 0.2s;
        }
        .floating-cta .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* ─── KEYFRAMES ─── */
        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }
        @keyframes popInBtn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes driftCloud {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(140vw);
            }
        }
        @keyframes flap {
            from {
                transform: rotate(-8deg);
            }
            to {
                transform: rotate(28deg);
            }
        }
        @keyframes invitePulse {
            0%,
            100% {
                filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.25));
            }
            50% {
                filter: drop-shadow(0 10px 30px rgba(255, 193, 7, 0.65));
            }
        }
        @keyframes shimmer {
            to {
                background-position: 300% center;
            }
        }
        @keyframes continuousZoom {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
            }
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 600px) {
            #page4 h1 {
                font-size: 1.2rem;
                top: 6vh;
                left: 1rem;
                right: 1rem;
            }
            #page4::before {
                border-width: 4px;
                inset: 0.5rem;
            }
            #page4 #play-music {
                width: 7vh;
                height: 7vh;
            }
            #page1 .message {
                font-size: 2rem;
            }
            #page1 .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }

            /* Floating CTA becomes bottom bar */
            .floating-cta {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                top: auto;
                transform: none;
                flex-direction: row;
                justify-content: center;
                padding: 0.5rem 0.8rem;
                background: rgba(12, 12, 20, 0.92);
                backdrop-filter: blur(16px);
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                gap: 0.6rem;
                box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.4);
                z-index: 50;
                /* 👈 lowered */
            }
            .floating-cta a {
                writing-mode: horizontal-tb;
                flex-direction: row;
                padding: 0.5rem 1rem;
                font-size: 0.7rem;
                border-radius: 30px;
                min-width: auto;
                gap: 0.4rem;
            }
            .floating-cta .cta-icon {
                writing-mode: horizontal-tb;
                font-size: 0.85rem;
            }
            .floating-cta .back-btn {
                writing-mode: horizontal-tb;
                padding: 0.5rem 1rem;
                font-size: 0.7rem;
            }

            /* Give page 3 bottom padding so the magic button clears the CTA */
            #page3 .magic-btn {
                bottom: 8%;
                /* 👈 move up a bit */
                z-index: 200;
            }

            #page2 .gallery-btn {
                bottom: 8%;
                /* 👈 move up a bit */
                z-index: 200;
            }
        }

        /* ─── FIX for page4 CTA overlap ─── */
        @media (max-width: 600px) {
            #page4 {
                padding-bottom: 0;
            }
        }
    </style>
    <base target="_blank" />
</head>
<body>

    <!-- ─── FLOATING CTA ─── -->
    <div class="floating-cta">
        <a href="editor.html">
            <span class="cta-icon">✏️</span>
            Start Editing
        </a>
        <a href="../../birthday-gallery.html" class="back-btn">← Gallery</a>
    </div>

    <!-- ─── PAGE 1 ─── -->
    <section id="page1" class="page-section active">
        <div class="container">
            <div class="message">i heard its you birthday today</div>
            <button class="btn" onclick="goToPage('page2')">go to message</button>
        </div>
    </section>

    <!-- ─── PAGE 2 ─── -->
    <section id="page2" class="page-section">
        <div class="scene" id="scene">
            <div class="cloud c1"></div>
            <div class="cloud c2"></div>
            <div class="cloud c3"></div>

            <div class="pigeon-wrap" id="pigeonWrap">
                <svg viewBox="0 0 200 120">
                    <path class="tail" d="M38,80 L6,96 L44,90 Z" fill="#a8a8a8" />
                    <ellipse cx="92" cy="70" rx="55" ry="30" fill="#cfcfcf" />
                    <ellipse cx="92" cy="70" rx="55" ry="30" fill="url(#bodyGrad)" opacity="0.5" />

    <!-- ─── SHADERS ─── -->
    <script type="x-shader/x-vertex" id="vertexShader">
        #define M_PI 3.1415926535897932384626433832795
        uniform float uTime;
        uniform float uSize;
        attribute float aScale;
        attribute vec3 aColor;
        attribute float random;
        attribute float random1;
        attribute float aSpeed;
        varying vec3 vColor;
        varying vec2 vUv;
        void main() {
            float sign = 2.0 * (step(random, 0.5) - .5);
            float t = sign * mod(-uTime * aSpeed * 0.005 + 10.0 * aSpeed * aSpeed, M_PI);
            float a = pow(t, 2.0) * pow((t - sign * M_PI), 2.0);
            float radius = 0.14;
            vec3 myOffset = vec3(radius * 16.0 * pow(sin(t), 2.0) * sin(t),
                radius * (13.0 * cos(t) - 5.0 * cos(2.0 * t) - 2.0 * cos(3.0 * t) - cos(4.0 * t)),
                .15 * (a * (random1 - .5)) * sin(abs(10.0 * (sin(.2 * uTime + .2 * random))) * t));
            vec3 displacedPosition = myOffset;
            vec4 modelPosition = modelMatrix * vec4(displacedPosition.xyz, 1.0);
            vec4 viewPosition = viewMatrix * modelPosition;
            viewPosition.xyz += position * aScale * uSize * pow(a, .5) * .5;
            gl_Position = projectionMatrix * viewPosition;
            vColor = aColor;
            vUv = uv;
        }
    </script>

    <script type="x-shader/x-fragment" id="fragmentShader">
        varying vec3 vColor;
        varying vec2 vUv;
        void main() {
            vec2 uv = vUv;
            vec3 color = vColor;
            float strength = distance(uv, vec2(0.5));
            strength *= 2.0;
            strength = 1.0 - strength;
            gl_FragColor = vec4(strength * color, 1.0);
        }
    </script>

    <script type="x-shader/x-vertex" id="vertexShader1">
        #define M_PI 3.1415926535897932384626433832795
        uniform float uTime;
        uniform float uSize;
        attribute float aScale;
        attribute vec3 aColor;
        attribute float phi;
        attribute float random;
        attribute float random1;
        varying vec3 vColor;
        varying vec2 vUv;
        void main() {
            float t = 0.01 * uTime + 12.0;
            float angle = phi;
            t = mod((-uTime + 100.0) * 0.06 * random1 + random * 2.0 * M_PI, 2.0 * M_PI);
            vec3 myOffset = vec3(5.85 * cos(angle * (t)), 2.0 * (t - M_PI), 3.0 * sin(angle * (t) / t));
            vec4 modelPosition = modelMatrix * vec4(myOffset, 1.0);
            vec4 viewPosition = viewMatrix * modelPosition;
            viewPosition.xyz += position * aScale * uSize;
            gl_Position = projectionMatrix * viewPosition;
            vColor = aColor;
            vUv = uv;
        }
    </script>

    <script type="x-shader/x-fragment" id="fragmentShader1">
        uniform sampler2D uTex;
        varying vec3 vColor;
        varying vec2 vUv;
        void main() {
            vec2 uv = vUv;
            vec3 color = vColor;
            float strength = distance(uv, vec2(0.5, .65));
            strength *= 2.0;
            strength = 1.0 - strength;
            vec3 texture = texture2D(uTex, uv).rgb;
            gl_FragColor = vec4(texture * color * (strength + .3), 1.);
        }
    </script>

    <!-- ─── MAIN SCRIPT ─── -->
    <script>
        // ─── NAVIGATION ───
        function goToPage(pageId) {
            document.querySelectorAll('.page-section').forEach(section => {
                section.classList.remove('active');
            });
            const target = document.getElementById(pageId);
            target.classList.add('active');

            if (pageId === 'page2') initPigeonAnimation();
            else if (pageId === 'page3') initSwiper();
            else if (pageId === 'page4') initThreeJS();
        }

        // ─── PAGE 2: PIGEON ───
        let pigeonInitialized = false;
        let galleryBtnShown = false;

        function initPigeonAnimation() {
            if (pigeonInitialized) return;
            pigeonInitialized = true;
            galleryBtnShown = false;

            const envelopeFront = document.getElementById('envelopeFront');
            const fallingSeal = document.getElementById('fallingSeal');
            const galleryBtn = document.getElementById('galleryBtn');
            const scene = document.getElementById('scene');
            const pigeonWrap = document.getElementById('pigeonWrap');
            const envelopeCarried = document.getElementById('envelopeCarried');
            const envelopeFalling = document.getElementById('envelopeFalling');
            const fallingFlap = document.getElementById('fallingFlap');
            const paper = document.getElementById('paper');
            const overlay = document.getElementById('overlay');
            const hint = document.getElementById('hint');

            envelopeFalling.classList.remove('visible', 'landed', 'opened');
            fallingFlap.classList.remove('open');
            fallingSeal.style.opacity = '1';
            paper.classList.remove('show', 'text-show');
            overlay.classList.remove('show', 'dark');
            hint.classList.remove('show');
            galleryBtn.classList.remove('visible');
            envelopeCarried.style.opacity = '1';
            pigeonWrap.style.opacity = '1';

            const FLIGHT_DURATION = 5200;
            const DROP_FRACTION = 0.5;
            const FALL_DURATION = 1800;
            const BASE_W = 50,
                BASE_H = 36;

            let startTime = null;
            let dropped = false;

            function vw() { return window.innerWidth; }

            function vh() { return window.innerHeight; }

            function startX() { return 0; }

            function endX() { return vw() + 260; }

            function frame(ts) {
                if (startTime === null) startTime = ts;
                const t = Math.min((ts - startTime) / FLIGHT_DURATION, 1);

                const x = startX() + (endX() - startX()) * t;
                const bob = Math.sin(t * Math.PI * 6) * 12;
                const baseTop = vh() * 0.10;

                pigeonWrap.style.transform = `translate(${x}px, ${bob}px)`;
                pigeonWrap.style.top = baseTop + 'px';

                if (!dropped && t >= DROP_FRACTION) {
                    dropped = true;
                    dropEnvelope();
                }

                if (t < 1) {
                    requestAnimationFrame(frame);
                } else {
                    pigeonWrap.style.opacity = '0';
                }
            }

            function dropEnvelope() {
                const rect = envelopeCarried.getBoundingClientRect();
                envelopeCarried.style.opacity = '0';

                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const startScale = rect.width / BASE_W;

                const startLeft = cx - (BASE_W * startScale) / 2;
                const startTop = cy - (BASE_H * startScale) / 2;

                const startTransform =
                    `translate(${startLeft}px, ${startTop}px) scale(${startScale})`;

                envelopeFalling.style.transition = 'none';
                envelopeFalling.style.transform = startTransform;
                envelopeFalling.classList.add('visible');

                envelopeFront.style.transition = 'none';
                envelopeFront.style.transform = startTransform;
                envelopeFront.classList.add('visible');

                void envelopeFalling.offsetHeight;

                const targetW = Math.min(Math.max(vw() * 0.58, 220), 460);
                const targetH = targetW * (BASE_H / BASE_W);
                const finalScale = targetW / BASE_W;
                const centerLeft = (vw() - targetW) / 2;
                const centerTop = (vh() - targetH) / 2;

                const fallTransition =
                    `transform ${FALL_DURATION}ms cubic-bezier(.18,.72,.36,1.05)`;
                const fallTransform =
                    `translate(${centerLeft}px, ${centerTop}px) scale(${finalScale})`;

                envelopeFalling.style.transition = fallTransition;
                envelopeFalling.style.transform = fallTransform;

                envelopeFront.style.transition = fallTransition;
                envelopeFront.style.transform = fallTransform;

                paper.style.transition = 'none';
                paper.style.width = targetW * 0.9 + 'px';
                paper.style.height = targetH * 0.5 + 'px';
                paper.style.transform =
                    `translate(${centerLeft + targetW * 0.05}px, ${centerTop + targetH * 0.25}px) scale(0.15)`;
                void paper.offsetHeight;

                overlay.classList.add('show');

                setTimeout(() => {
                    envelopeFalling.classList.add('landed');
                    hint.classList.add('show');
                }, FALL_DURATION);
            }

            function launchConfetti() {
                const colors = ['var(--confetti-1)', 'var(--confetti-2)', 'var(--confetti-3)', 'var(--confetti-4)',
                    'var(--confetti-5)'
                ];
                const count = 48;
                for (let i = 0; i < count; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 140 + Math.random() * 300;
                    const dx = Math.cos(angle) * dist;
                    const dy = Math.sin(angle) * dist - 70;
                    const rot = (Math.random() * 720 - 360).toFixed(0);
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const delay = Math.random() * 140;
                    const duration = 900 + Math.random() * 800;

                    piece.style.background = color;
                    piece.style.transform = 'translate(-50%,-50%)';
                    piece.style.transition =
                        `transform ${duration}ms cubic-bezier(.2,.7,.3,1) ${delay}ms, opacity ${duration}ms ease ${delay}ms`;

                    scene.appendChild(piece);

                    requestAnimationFrame(() => {
                        piece.style.transform =
                            `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${rot}deg)`;
                        piece.style.opacity = '0';
                    });

                    setTimeout(() => piece.remove(), delay + duration + 200);
                }
            }

            function openEnvelope() {
                if (!envelopeFalling.classList.contains('landed')) return;
                if (envelopeFalling.classList.contains('opened')) return;

                envelopeFalling.classList.remove('landed');
                envelopeFalling.classList.add('opened');
                fallingFlap.classList.add('open');
                fallingSeal.style.opacity = '0';

                overlay.classList.add('dark');
                hint.classList.remove('show');
                launchConfetti();

                const targetW = Math.min(Math.max(vw() * 0.58, 220), 460);
                const targetH = targetW * (BASE_H / BASE_W);
                const finalScale = targetW / BASE_W;
                const centerLeft = (vw() - targetW) / 2;
                const centerTop = (vh() - targetH) / 2;

                const envShiftY = targetH * 0.6;
                const openTransition = 'transform 1.6s cubic-bezier(.16,.7,.2,1)';
                const openTransform =
                    `translate(${centerLeft}px, ${centerTop + envShiftY}px) scale(${finalScale})`;

                envelopeFalling.style.transition = openTransition;
                envelopeFalling.style.transform = openTransform;

                envelopeFront.style.transition = openTransition;
                envelopeFront.style.transform = openTransform;

                const finalW = Math.min(Math.max(vw() * 0.8, 260), 520);
                const finalH = finalW * 1.15;
                const finalLeft = (vw() - finalW) / 2;

                const envTop = centerTop + envShiftY;
                const pocketBottom = envTop + (targetH * 0.65);
                const finalTop = pocketBottom - finalH;

                setTimeout(() => {
                    paper.style.transition =
                        'transform 1.6s cubic-bezier(.16,.7,.2,1), width 1.6s cubic-bezier(.16,.7,.2,1), height 1.6s cubic-bezier(.16,.7,.2,1), opacity 0.5s ease';
                    paper.classList.add('show');
                    paper.style.width = finalW + 'px';
                    paper.style.height = finalH + 'px';
                    paper.style.transform = `translate(${finalLeft}px, ${finalTop}px) scale(1)`;
                }, 450);

                setTimeout(() => {
                    paper.classList.add('text-show');
                    setTimeout(() => {
                        if (!galleryBtnShown) {
                            galleryBtnShown = true;
                            galleryBtn.classList.add('visible');
                        }
                    }, 1200);
                }, 1300);
            }

            envelopeFalling.addEventListener('click', openEnvelope);
            envelopeFalling.addEventListener('touchend', function(e) {
                e.preventDefault();
                openEnvelope();
            }, { passive: false });

            startTime = null;
            dropped = false;
            requestAnimationFrame(frame);
        }

        // ─── PAGE 3: SWIPER ───
        let swiperInstance = null;

        function initSwiper() {
            if (swiperInstance) {
                swiperInstance.destroy(true, true);
            }
            swiperInstance = new Swiper('.mySwiper', {
                effect: 'coverflow',
                grabCursor: true,
                centeredSlides: true,
                slidesPerView: 'auto',
                loop: false,
                rewind: false,
                speed: 800,
                autoplay: {
                    delay: 2000,
                    disableOnInteraction: false,
                },
                coverflowEffect: {
                    rotate: 0,
                    stretch: -40,
                    depth: 350,
                    modifier: 1,
                    slideShadows: true,
                    scale: 0.85,
                },
                pagination: {
                    el: '.swiper-pagination',
                    clickable: true,
                },
                on: {
                    reachEnd: function() {
                        setTimeout(() => {
                            this.params.autoplay.reverseDirection = true;
                            this.autoplay.start();
                        }, 10);
                    },
                    reachBeginning: function() {
                        setTimeout(() => {
                            this.params.autoplay.reverseDirection = false;
                            this.autoplay.start();
                        }, 10);
                    }
                }
            });
        }

        // ─── PAGE 4: THREE.JS ───
        let threeInitialized = false;

        function initThreeJS() {
            if (threeInitialized) return;
            threeInitialized = true;

            import('https://cdn.skypack.dev/three@0.135.0').then(THREE => {
                import('https://cdn.skypack.dev/gsap@3.8.0').then(gsapModule => {
                    const gsap = gsapModule.gsap || gsapModule.default || gsapModule;
                    startThreeScene(THREE, gsap);
                });
            });
        }

        function startThreeScene(THREE, gsap) {
            class World {
                constructor({ canvas, width, height, cameraPosition, fieldOfView = 75, nearPlane = 0.1,
                        farPlane = 100 }) {
                    this.parameters = {
                        count: 1500,
                        max: 12.5 * Math.PI,
                        a: 2,
                        c: 4.5
                    };

                    this.textureLoader = new THREE.TextureLoader();
                    this.scene = new THREE.Scene();
                    this.scene.background = new THREE.Color(0x16000a);
                    this.clock = new THREE.Clock();
                    this.data = 0;
                    this.time = { current: 0, t0: 0, t1: 0, t: 0, frequency: 0.0005 };
                    this.angle = { x: 0, z: 0 };
                    this.width = width || window.innerWidth;
                    this.height = height || window.innerHeight;
                    this.aspectRatio = this.width / this.height;
                    this.fieldOfView = fieldOfView;
                    this.camera = new THREE.PerspectiveCamera(fieldOfView, this.aspectRatio, nearPlane,
                    farPlane);
                    this.camera.position.set(cameraPosition.x, cameraPosition.y, cameraPosition.z);
                    this.scene.add(this.camera);
                    this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                    this.pixelRatio = Math.min(window.devicePixelRatio, 2);
                    this.renderer.setPixelRatio(this.pixelRatio);
                    this.renderer.setSize(this.width, this.height);
                    this.timer = 0;
                    this.addToScene();
                    this.addButton();
                    this.render();
                    this.listenToResize();
                    this.listenToMouseMove();
                }

                render() {
                    this.renderer.render(this.scene, this.camera);
                }

                loop() {
                    this.time.elapsed = this.clock.getElapsedTime();
                    this.time.delta = Math.min(60, (this.time.current - this.time.elapsed) * 1000);

                    if (this.isRunning) {
                        this.time.t = this.time.elapsed - this.time.t0 + this.time.t1;
                        const progress = Math.min(this.time.t / this.animationDuration, 1);
                        this.data = Math.sin(progress * Math.PI) * 4;
                        this.angle.x += this.time.delta * 0.001 * 0.63;
                        this.angle.z += this.time.delta * 0.001 * 0.39;
                        const justFinished = progress >= 1;

                        if (justFinished) {
                            this.time.t1 = this.time.t;
                            this.audioBtn.disabled = false;
                            this.audioBtn.classList.remove("zooming");
                            this.audioBtn.style.pointerEvents = 'auto';
                            this.isRunning = false;
                            this.data = 0;
                            const tl = gsap.timeline();
                            this.angle.x = 0;
                            this.angle.z = 0;
                            tl.to(this.camera.position, { x: 0, z: 4.5, duration: 4, ease: "expo.in" });
                        } else {
                            this.camera.position.x = Math.sin(this.angle.x) * this.parameters.a;
                            this.camera.position.z = Math.min(Math.max(Math.cos(this.angle.z) * this
                                .parameters.c, 1.75), 6.5);
                        }
                    }

                    this.camera.lookAt(this.scene.position);

                    if (this.heartMaterial) {
                        this.heartMaterial.uniforms.uTime.value += this.time.delta * this.time.frequency *
                            (1 + this.data * 0.2);
                    }

                    if (this.snowMaterial) {
                        this.snowMaterial.uniforms.uTime.value += this.time.delta * 0.0004 * (1 + this.data);
                    }

                    this.render();
                    this.time.current = this.time.elapsed;

                    if (document.getElementById('page4').classList.contains('active')) {
                        requestAnimationFrame(this.loop.bind(this));
                    }
                }

                listenToResize() {
                    window.addEventListener("resize", () => {
                        this.width = window.innerWidth;
                        this.height = window.innerHeight;
                        this.camera.aspect = this.width / this.height;
                        this.camera.updateProjectionMatrix();
                        this.renderer.setSize(this.width, this.height);
                    });
                }

                listenToMouseMove() {
                    window.addEventListener("mousemove", e => {
                        const x = e.clientX;
                        const y = e.clientY;
                        gsap.to(this.camera.position, {
                            x: gsap.utils.mapRange(0, window.innerWidth, 0.2, -0.2, x),
                            y: gsap.utils.mapRange(0, window.innerHeight, 0.2, -0.2, -y)
                        });
                    });
                }

                addHeart() {
                    this.heartMaterial = new THREE.ShaderMaterial({
                        fragmentShader: document.getElementById("fragmentShader").textContent,
                        vertexShader: document.getElementById("vertexShader").textContent,
                        uniforms: {
                            uTime: { value: 0 },
                            uSize: { value: 0.2 },
                            uTex: { value: new THREE.TextureLoader().load(
                                    "https://assets.codepen.io/74321/heart.png") }
                        },
                        depthWrite: false,
                        blending: THREE.AdditiveBlending,
                        transparent: true
                    });

                    const count = this.parameters.count;
                    const scales = new Float32Array(count * 1);
                    const colors = new Float32Array(count * 3);
                    const speeds = new Float32Array(count);
                    const randoms = new Float32Array(count);
                    const randoms1 = new Float32Array(count);
                    const colorChoices = ["white", "red", "pink", "crimson", "hotpink", "green"];

                    const squareGeometry = new THREE.PlaneGeometry(1, 1);
                    this.instancedGeometry = new THREE.InstancedBufferGeometry();
                    Object.keys(squareGeometry.attributes).forEach(attr => {
                        this.instancedGeometry.attributes[attr] = squareGeometry.attributes[attr];
                    });
                    this.instancedGeometry.index = squareGeometry.index;
                    this.instancedGeometry.maxInstancedCount = count;

                    for (let i = 0; i < count; i++) {
                        const i3 = 3 * i;
                        randoms[i] = Math.random();
                        randoms1[i] = Math.random();
                        scales[i] = Math.random() * 0.35;
                        const colorIndex = Math.floor(Math.random() * colorChoices.length);
                        const color = new THREE.Color(colorChoices[colorIndex]);
                        colors[i3 + 0] = color.r;
                        colors[i3 + 1] = color.g;
                        colors[i3 + 2] = color.b;
                        speeds[i] = Math.random() * this.parameters.max;
                    }

                    this.instancedGeometry.setAttribute("random", new THREE.InstancedBufferAttribute(
                        randoms, 1, false));
                    this.instancedGeometry.setAttribute("random1", new THREE.InstancedBufferAttribute(
                        randoms1, 1, false));
                    this.instancedGeometry.setAttribute("aScale", new THREE.InstancedBufferAttribute(
                        scales, 1, false));
                    this.instancedGeometry.setAttribute("aSpeed", new THREE.InstancedBufferAttribute(
                        speeds, 1, false));
                    this.instancedGeometry.setAttribute("aColor", new THREE.InstancedBufferAttribute(
                        colors, 3, false));

                    this.heart = new THREE.Mesh(this.instancedGeometry, this.heartMaterial);
                    this.scene.add(this.heart);
                }

                addToScene() {
                    this.addHeart();
                    this.addSnow();
                }

                addButton() {
                    this.audioBtn = document.getElementById("play-music");
                    this.animationDuration = 30;
                    this.audioBtn.addEventListener("click", () => {
                        this.audioBtn.disabled = true;
                        this.audioBtn.style.pointerEvents = 'none';
                        this.audioBtn.classList.add("zooming");
                        this.time.t0 = this.time.elapsed;
                        this.data = 0;
                        this.isRunning = true;
                    });
                }

                addSnow() {
                    this.snowMaterial = new THREE.ShaderMaterial({
                        fragmentShader: document.getElementById("fragmentShader1").textContent,
                        vertexShader: document.getElementById("vertexShader1").textContent,
                        uniforms: {
                            uTime: { value: 0 },
                            uSize: { value: 0.3 },
                            uTex: { value: new THREE.TextureLoader().load(
                                    "https://assets.codepen.io/74321/heart.png") }
                        },
                        depthWrite: false,
                        blending: THREE.AdditiveBlending,
                        transparent: true
                    });

                    const count = 550;
                    const scales = new Float32Array(count * 1);
                    const colors = new Float32Array(count * 3);
                    const phis = new Float32Array(count);
                    const randoms = new Float32Array(count);
                    const randoms1 = new Float32Array(count);
                    const colorChoices = ["red", "pink", "hotpink", "green"];

                    const squareGeometry = new THREE.PlaneGeometry(1, 1);
                    this.instancedGeometrySnow = new THREE.InstancedBufferGeometry();
                    Object.keys(squareGeometry.attributes).forEach(attr => {
                        this.instancedGeometrySnow.attributes[attr] = squareGeometry.attributes[
                        attr];
                    });
                    this.instancedGeometrySnow.index = squareGeometry.index;
                    this.instancedGeometrySnow.maxInstancedCount = count;

                    for (let i = 0; i < count; i++) {
                        const phi = (Math.random() - 0.5) * 10;
                        const i3 = 3 * i;
                        phis[i] = phi;
                        randoms[i] = Math.random();
                        randoms1[i] = Math.random();
                        scales[i] = Math.random() * 0.35;
                        const colorIndex = Math.floor(Math.random() * colorChoices.length);
                        const color = new THREE.Color(colorChoices[colorIndex]);
                        colors[i3 + 0] = color.r;
                        colors[i3 + 1] = color.g;
                        colors[i3 + 2] = color.b;
                    }

                    this.instancedGeometrySnow.setAttribute("phi", new THREE.InstancedBufferAttribute(
                        phis, 1, false));
                    this.instancedGeometrySnow.setAttribute("random", new THREE.InstancedBufferAttribute(
                        randoms, 1, false));
                    this.instancedGeometrySnow.setAttribute("random1", new THREE.InstancedBufferAttribute(
                        randoms1, 1, false));
                    this.instancedGeometrySnow.setAttribute("aScale", new THREE.InstancedBufferAttribute(
                        scales, 1, false));
                    this.instancedGeometrySnow.setAttribute("aColor", new THREE.InstancedBufferAttribute(
                        colors, 3, false));

                    this.snow = new THREE.Mesh(this.instancedGeometrySnow, this.snowMaterial);
                    this.scene.add(this.snow);
                }
            }

            const world = new World({
                canvas: document.querySelector("#page4 .webgl"),
                cameraPosition: { x: 0, y: 0, z: 4.5 }
            });

            world.loop();
        }
    </script>
</body>
</html>
