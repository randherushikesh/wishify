<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Special Birthday Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #0a0a0a; color: #fff; }

    /* INTRO */
    .intro {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 3rem 2rem;
      background: linear-gradient(160deg, #1a0030, #0a0a0a);
    }
    .intro h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; margin-bottom: 1rem; }
    .intro p  { color: rgba(255,255,255,.5); font-size: 1.1rem; margin-bottom: 2rem; }
    .scroll-hint { font-size: .85rem; color: rgba(255,255,255,.3); letter-spacing: .1em; animation: bounce .9s ease-in-out infinite alternate; }
    @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(8px)} }

    /* TIMELINE */
    .timeline { padding: 5rem 1.5rem; position: relative; max-width: 900px; margin: 0 auto; }
    .timeline-line {
      position: absolute; left: 50%; top: 0; bottom: 0;
      width: 2px; background: linear-gradient(180deg,#f4c842,rgba(244,200,66,.2));
      transform: translateX(-50%);
    }

    .tl-item { display: flex; margin-bottom: 5rem; position: relative; align-items: flex-start; }
    .tl-item.right { justify-content: flex-end; padding-right: calc(50% + 40px); }
    .tl-item.left  { justify-content: flex-start; padding-left: calc(50% + 40px); }
    .tl-item:last-child { margin-bottom: 0; }

    .tl-dot {
      position: absolute; left: 50%; top: 20px;
      width: 16px; height: 16px; background: #f4c842;
      border-radius: 50%; transform: translateX(-50%); z-index: 2;
      box-shadow: 0 0 0 5px rgba(244,200,66,.2);
    }

    .tl-card { border-radius: 16px; padding: 1.2rem; width: 100%; max-width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
    .tl-year { display: inline-block; background: #f4c842; color: #111; font-size: .75rem; font-weight: 800; padding: .25rem .7rem; border-radius: 50px; margin-bottom: .6rem; }
    .tl-card h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: .75rem; line-height: 1.3; }
    .tl-img { width: 100%; height: 200px; border-radius: 10px; object-fit: cover; margin-bottom: .75rem; display: block; }
    .tl-img-placeholder { width: 100%; height: 200px; border-radius: 10px; background: rgba(0,0,0,.1); display: flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: .75rem; }
    .tl-caption { font-size: .85rem; line-height: 1.6; opacity: .7; }

    /* FINAL */
    .final {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 3rem 2rem;
      background: linear-gradient(160deg, #0a0a0a, #1a0030);
    }
    .final h2 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; margin-bottom: 1.2rem; }
    .final-msg { color: rgba(255,255,255,.75); font-size: 1rem; line-height: 1.8; max-width: 500px; margin-bottom: 1.5rem; white-space: pre-wrap; }
    .final-photo { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 4px solid rgba(244,200,66,.5); margin-bottom: 1.5rem; display: block; }
    .final-from { color: #f4c842; font-weight: 700; font-size: 1rem; }

    .brand { text-align: center; padding: 1.5rem; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.2); }

    /* error */
    .error { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; color: rgba(255,255,255,.5); }

    @media (max-width: 640px) {
      .tl-item { flex-direction: column; padding: 0 !important; margin-left: 30px; }
      .timeline-line { left: 8px; }
      .tl-dot { left: 8px; }
      .tl-card { max-width: 100%; }
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
  async function loadPage() {
    var app = document.getElementById('app');
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');

    if (!slug) {
      app.innerHTML = '<div class="error"><p>No wish found.</p></div>';
      return;
    }

    try {
      var res = await fetch('https://wishify.onrender.com/api/pages/' + slug);
      var result = await res.json();

      if (!result.success) {
        app.innerHTML = '<div class="error"><p>Wish not found.</p></div>';
        return;
      }

      var d = result.page.data;

      // Apply colors
      var bg1 = d.bgColor1 || '#1a0030';
      var bg2 = d.bgColor2 || '#0a0a0a';
      var cardColor = d.cardColor || '#ffffff';
      var isDark = isColorDark(cardColor);
      var textColor = isDark ? '#fff' : '#111';
      var captionColor = isDark ? 'rgba(255,255,255,.6)' : '#555';

      // Build memories HTML
      var positions = ['right','left','right','left','right'];
      var memoriesHtml = '';
      if (d.memories && d.memories.length) {
        d.memories.forEach(function(m, i) {
          var imgHtml = m.photoUrl
            ? '<img class="tl-img" src="' + m.photoUrl + '" alt="Memory photo"/>'
            : '<div class="tl-img-placeholder">📷</div>';

          memoriesHtml += '<div class="tl-item ' + positions[i] + '">' +
            '<div class="tl-dot"></div>' +
            '<div class="tl-card" style="background:' + cardColor + ';color:' + textColor + '">' +
              '<span class="tl-year">' + (m.year || '') + '</span>' +
              '<h3>' + (m.title || '') + '</h3>' +
              imgHtml +
              '<p class="tl-caption" style="color:' + captionColor + '">' + (m.caption || '') + '</p>' +
            '</div>' +
          '</div>';
        });
      }

      // Final photo
      var finalPhotoHtml = d.finalPhotoUrl
        ? '<img class="final-photo" src="' + d.finalPhotoUrl + '" alt="Photo"/>'
        : '';

      // Build full page
      app.innerHTML =
        '<div class="intro" style="background:linear-gradient(160deg,' + bg1 + ',' + bg2 + ')">' +
          '<h1>Happy Birthday ' + (d.recipientName || 'Friend') + ' 🎂</h1>' +
          '<p>Let\'s relive some beautiful memories together</p>' +
          '<span class="scroll-hint">↓ Scroll Down ↓</span>' +
        '</div>' +

        '<div style="background:' + bg2 + '">' +
          '<div class="timeline">' +
            '<div class="timeline-line"></div>' +
            memoriesHtml +
          '</div>' +
        '</div>' +

        '<div class="final" style="background:linear-gradient(160deg,' + bg2 + ',' + bg1 + ')">' +
          '<h2>Happy Birthday ' + (d.finalName || d.recipientName || 'Friend') + ' 🎉</h2>' +
          finalPhotoHtml +
          '<p class="final-msg">' + (d.finalMessage || '') + '</p>' +
          '<p class="final-from">From ❤️ ' + (d.finalFrom || 'Someone Special') + '</p>' +
        '</div>' +

        '<div class="brand">Made with love · Wishify</div>';

    } catch(err) {
      app.innerHTML = '<div class="error"><p>Could not load wish. Is the server running?</p></div>';
    }
  }

  function isColorDark(hex) {
    if (!hex || hex.length < 7) return false;
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return (r * 0.299 + g * 0.587 + b * 0.114) < 128;
  }

  loadPage();
</script>
</body>
</html>
