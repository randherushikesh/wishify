<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A Royal Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,900;1,500;1,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --gold:#d4af37;
    --gold-soft:#f0dd9e;
    --bg1:#1a0010;
    --bg2:#0a0a0a;
    --card:#140508;
    --ink:#f6efe2;
  }
  html{scroll-behavior:smooth;}
  body{font-family:'Nunito',sans-serif;background:#0a0a0a;color:var(--ink);overflow-x:hidden;}
  .serif{font-family:'Playfair Display',serif;}

  /* ---------- shared ornaments ---------- */
  .divider{display:flex;align-items:center;justify-content:center;gap:.9rem;margin:0 auto 2.5rem;max-width:280px;}
  .divider .line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .divider .diamond{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 12px rgba(212,175,55,.6);}
  .eyebrow{font-size:.72rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold-soft);font-weight:700;margin-bottom:1.2rem;}
  .fade-up{opacity:0;transform:translateY(28px);transition:opacity .9s ease,transform .9s ease;}
  .fade-up.show{opacity:1;transform:translateY(0);}

  /* ---------- HERO ---------- */
  .hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4rem 1.6rem;overflow:hidden;}
  .petal{position:absolute;bottom:-40px;width:6px;height:6px;background:var(--gold);border-radius:50%;opacity:.55;animation:rise linear infinite;box-shadow:0 0 8px rgba(212,175,55,.7);}
  @keyframes rise{0%{transform:translateY(0) translateX(0);opacity:0;}10%{opacity:.6;}100%{transform:translateY(-110vh) translateX(30px);opacity:0;}}
  .corner{position:absolute;width:70px;height:70px;opacity:.55;}
  .corner svg{width:100%;height:100%;}
  .corner.tl{top:22px;left:22px;} .corner.tr{top:22px;right:22px;transform:scaleX(-1);}
  .corner.bl{bottom:22px;left:22px;transform:scaleY(-1);} .corner.br{bottom:22px;right:22px;transform:scale(-1,-1);}

  .hero-names{font-size:clamp(2.4rem,8vw,4.6rem);font-weight:700;line-height:1.15;margin-bottom:1.1rem;background:linear-gradient(100deg,var(--gold-soft) 0%,var(--gold) 35%,#fff6da 50%,var(--gold) 65%,var(--gold-soft) 100%);background-size:220% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmer 6s linear infinite;}
  @keyframes shimmer{to{background-position:-220% center;}}
  .hero-names .amp{font-style:italic;font-weight:500;padding:0 .25rem;opacity:.85;}
  .hero-date{font-size:1.05rem;letter-spacing:.08em;color:var(--gold-soft);margin-bottom:1.6rem;font-weight:600;}
  .hero-msg{max-width:520px;color:rgba(246,239,226,.7);font-size:1.02rem;line-height:1.85;margin-bottom:2.2rem;}
  .scroll-hint{font-size:.78rem;color:rgba(246,239,226,.4);letter-spacing:.2em;text-transform:uppercase;animation:bounce .9s ease-in-out infinite alternate;}
  @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(9px)}}

  /* ---------- SECTION HEADS ---------- */
  .section{padding:5.5rem 1.6rem;position:relative;}
  .section-head{text-align:center;margin-bottom:3.2rem;}
  .section-head h2{font-size:clamp(1.9rem,4.4vw,2.7rem);font-weight:700;margin-bottom:1rem;}
  .section-head p{color:rgba(246,239,226,.55);max-width:460px;margin:0 auto;font-size:.98rem;line-height:1.7;}

  /* ---------- HAPPY COUPLE ---------- */
  .couple-wrap{max-width:900px;margin:0 auto;display:flex;justify-content:center;gap:5rem;flex-wrap:wrap;text-align:center;}
  .couple-person{max-width:280px;}
  .couple-photo{width:190px;height:190px;border-radius:50%;object-fit:cover;margin:0 auto 1.4rem;border:5px solid;box-shadow:0 10px 40px rgba(0,0,0,.4);}
  .couple-photo.bride{border-color:var(--gold-soft);}
  .couple-photo.groom{border-color:var(--gold);}
  .couple-photo-empty{width:190px;height:190px;border-radius:50%;margin:0 auto 1.4rem;border:5px dashed rgba(212,175,55,.4);display:flex;align-items:center;justify-content:center;font-size:2.2rem;color:rgba(212,175,55,.4);}
  .couple-person h3{font-size:1.5rem;font-weight:700;margin-bottom:.5rem;}
  .couple-parent{font-size:.85rem;color:rgba(246,239,226,.55);margin-bottom:.7rem;}
  .couple-tagline{font-size:.86rem;color:var(--gold-soft);font-style:italic;line-height:1.6;}

  /* ---------- GALLERY CAROUSEL ---------- */
  .carousel{position:relative;max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:center;perspective:1400px;}
  .car-track{position:relative;display:flex;align-items:center;justify-content:center;width:100%;height:460px;}
  .car-slide{position:absolute;border-radius:16px;overflow:hidden;transition:transform .55s cubic-bezier(.4,0,.2,1),opacity .55s ease,filter .55s ease;box-shadow:0 20px 50px rgba(0,0,0,.5);}
  .car-slide img{width:100%;height:100%;object-fit:cover;display:block;}
  .car-slide.center{width:320px;height:420px;z-index:3;border:2px solid var(--gold);transform:translateX(0) rotateY(0) scale(1);opacity:1;}
  .car-slide.left1{width:170px;height:380px;z-index:2;transform:translateX(-210px) rotateY(28deg) scale(.88);opacity:.55;filter:brightness(.6);}
  .car-slide.right1{width:170px;height:380px;z-index:2;transform:translateX(210px) rotateY(-28deg) scale(.88);opacity:.55;filter:brightness(.6);}
  .car-slide.left2{width:120px;height:320px;z-index:1;transform:translateX(-330px) rotateY(35deg) scale(.78);opacity:.25;filter:brightness(.4);}
  .car-slide.right2{width:120px;height:320px;z-index:1;transform:translateX(330px) rotateY(-35deg) scale(.78);opacity:.25;filter:brightness(.4);}
  .car-slide.hide{opacity:0;transform:scale(.6);z-index:0;}
  .car-empty{width:100%;height:100%;background:rgba(212,175,55,.06);display:flex;align-items:center;justify-content:center;font-size:2.2rem;color:rgba(212,175,55,.35);}
  .car-arrow{position:relative;z-index:5;width:44px;height:44px;border-radius:50%;background:rgba(20,5,8,.7);border:1px solid rgba(212,175,55,.4);color:var(--gold-soft);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .2s;}
  .car-arrow:hover{background:rgba(212,175,55,.2);transform:scale(1.08);}
  .car-dots{display:flex;justify-content:center;gap:.5rem;margin-top:2rem;}
  .car-dot{width:8px;height:8px;border-radius:50%;background:rgba(212,175,55,.25);cursor:pointer;transition:background .2s,transform .2s;}
  .car-dot.active{background:var(--gold);transform:scale(1.3);}

  @media (max-width:700px){
    .car-track{height:340px;}
    .car-slide.center{width:220px;height:300px;}
    .car-slide.left1{width:100px;height:260px;transform:translateX(-120px) rotateY(28deg) scale(.85);}
    .car-slide.right1{width:100px;height:260px;transform:translateX(120px) rotateY(-28deg) scale(.85);}
    .car-slide.left2,.car-slide.right2{display:none;}
    .car-arrow{width:36px;height:36px;font-size:1rem;}
  }

  /* ---------- COUNTDOWN ---------- */
  .countdown{position:relative;padding:5.5rem 1.6rem;text-align:center;background-size:cover;background-position:center;isolation:isolate;}
  .countdown::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(26,0,16,.82),rgba(10,10,10,.82));z-index:-1;}
  .countdown h2{font-size:clamp(1.8rem,4.2vw,2.5rem);font-weight:700;margin-bottom:.5rem;}
  .countdown .sub{color:var(--gold-soft);font-size:1rem;margin-bottom:2.4rem;letter-spacing:.03em;}
  .cd-grid{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;max-width:700px;margin:0 auto;}
  .cd-box{background:rgba(246,239,226,.08);backdrop-filter:blur(6px);border:1px solid rgba(212,175,55,.25);border-radius:14px;padding:1.4rem 1.6rem;min-width:110px;}
  .cd-box .num{font-size:2.2rem;font-weight:800;color:var(--gold-soft);font-family:'Playfair Display',serif;}
  .cd-box .lbl{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(246,239,226,.6);margin-top:.3rem;}

  /* ---------- CEREMONY / EVENTS ---------- */
  .events{max-width:920px;margin:0 auto;display:flex;gap:2.2rem;flex-wrap:wrap;justify-content:center;position:relative;}
  .event-card{flex:1 1 320px;max-width:380px;background:var(--card);border:1px solid rgba(212,175,55,.35);border-radius:20px;padding:2.4rem 1.8rem;text-align:center;position:relative;}
  .event-card::before{content:'';position:absolute;inset:6px;border:1px solid rgba(212,175,55,.18);border-radius:15px;pointer-events:none;}
  .event-icon{font-size:1.9rem;margin-bottom:1rem;}
  .event-card h3{font-size:1.3rem;font-weight:700;margin-bottom:1rem;letter-spacing:.02em;}
  .event-row{font-size:.9rem;line-height:1.8;color:rgba(246,239,226,.72);}
  .event-row b{display:block;color:var(--gold-soft);font-weight:700;font-size:.98rem;margin-bottom:.15rem;}
  .event-sep{width:1px;background:linear-gradient(180deg,transparent,var(--gold),transparent);align-self:stretch;opacity:.5;}
  @media (max-width:760px){.event-sep{display:none;}}

  /* ---------- FINAL ---------- */
  .final{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4rem 1.8rem;}
  .final-photo{width:150px;height:150px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);box-shadow:0 0 0 6px rgba(212,175,55,.15);margin-bottom:1.8rem;}
  .final h2{font-size:clamp(1.9rem,4.4vw,2.7rem);font-weight:700;margin-bottom:1.3rem;}
  .final-msg{max-width:520px;color:rgba(246,239,226,.78);font-size:1.02rem;line-height:1.9;margin-bottom:1.6rem;white-space:pre-wrap;}
  .final-from{color:var(--gold);font-family:'Playfair Display',serif;font-style:italic;font-size:1.25rem;font-weight:600;}

  .brand{text-align:center;padding:2rem;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(246,239,226,.22);}
  .error{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;color:rgba(246,239,226,.5);}
</style>
</head>
<body>
<audio id="bg-music" loop preload="auto" style="display:none;"></audio>
<button id="audio-toggle" onclick="toggleMute()" style="display:none;position:fixed;bottom:1.5rem;right:1.5rem;z-index:1000;width:50px;height:50px;border-radius:50%;background:rgba(12,12,20,.85);backdrop-filter:blur(8px);border:1px solid rgba(212,175,55,.3);color:#d4af37;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);">🔇</button>
<div id="app"></div>

<script>
  var audioEl = document.getElementById('bg-music');
  var audioToggleBtn = document.getElementById('audio-toggle');

  function initAudio(url){
    if(!url) return;
    audioEl.src = url;
    audioToggleBtn.style.display = 'flex';
    audioEl.volume = 0.5;
    audioEl.play().then(function(){ audioToggleBtn.textContent = '🔊'; }).catch(function(){
      document.addEventListener('click', function enable(){
        audioEl.play(); audioToggleBtn.textContent = '🔊';
        document.removeEventListener('click', enable);
      });
    });
  }
  function toggleMute(){
    if(audioEl.muted){ audioEl.muted=false; audioToggleBtn.textContent='🔊'; }
    else { audioEl.muted=true; audioToggleBtn.textContent='🔇'; }
  }

  function isColorDark(hex){
    if(!hex || hex.length<7) return true;
    var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return (r*.299+g*.587+b*.114) < 128;
  }

  var cornerSVG = '<svg viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="M4 4V26M4 4H26" stroke="#d4af37" stroke-width="1.4"/>' +
    '<path d="M4 4C20 6 26 14 26 30" stroke="#d4af37" stroke-width="1"/>' +
    '<circle cx="4" cy="4" r="2.4" fill="#d4af37"/></svg>';

  function galleryOfPetals(){
    var html = '';
    for(var i=0;i<14;i++){
      var left = Math.random()*100, dur = 8+Math.random()*10, delay = Math.random()*10;
      html += '<span class="petal" style="left:' + left + '%;animation-duration:' + dur + 's;animation-delay:' + delay + 's;"></span>';
    }
    return html;
  }

  /* ---------------- CAROUSEL ---------------- */
  var carouselPhotos = [];
  var carIndex = 0;
  var carTimer = null;

  function idx(offset){
    var n = carouselPhotos.length;
    return ((carIndex + offset) % n + n) % n;
  }
  function slideHtml(cls, photoIndex){
    var url = carouselPhotos[photoIndex];
    return '<div class="car-slide ' + cls + '">' + (url ? '<img src="' + url + '"/>' : '<div class="car-empty">💍</div>') + '</div>';
  }
  function renderCarousel(){
    var track = document.getElementById('car-track');
    if(!track) return;
    var n = carouselPhotos.length;
    var html = '';
    if(n <= 1){
      html = slideHtml('center', idx(0));
    } else if(n <= 3){
      html = slideHtml('left1', idx(-1)) + slideHtml('center', idx(0)) + slideHtml('right1', idx(1));
    } else {
      html = slideHtml('left2', idx(-2)) + slideHtml('left1', idx(-1)) + slideHtml('center', idx(0)) + slideHtml('right1', idx(1)) + slideHtml('right2', idx(2));
    }
    track.innerHTML = html;
    var dotsWrap = document.getElementById('car-dots');
    if(dotsWrap){
      var dots = '';
      for(var i=0;i<n;i++) dots += '<span class="car-dot' + (i===carIndex?' active':'') + '" onclick="carGoTo(' + i + ')"></span>';
      dotsWrap.innerHTML = dots;
    }
  }
  function carNext(){ carIndex = idx(1); renderCarousel(); resetAutoplay(); }
  function carPrev(){ carIndex = idx(-1); renderCarousel(); resetAutoplay(); }
  function carGoTo(i){ carIndex = i; renderCarousel(); resetAutoplay(); }
  function resetAutoplay(){
    if(carTimer) clearInterval(carTimer);
    carTimer = setInterval(carNext, 4500);
  }

  /* ---------------- COUNTDOWN ---------------- */
  function startCountdown(targetStr){
    var target = new Date(targetStr).getTime();
    if(isNaN(target)) return;
    function tick(){
      var diff = Math.max(0, target - Date.now());
      var d = Math.floor(diff/86400000);
      var h = Math.floor(diff/3600000)%24;
      var m = Math.floor(diff/60000)%60;
      var s = Math.floor(diff/1000)%60;
      var elD=document.getElementById('cd-days'), elH=document.getElementById('cd-hours'),
          elM=document.getElementById('cd-min'), elS=document.getElementById('cd-sec');
      if(elD) elD.textContent = d;
      if(elH) elH.textContent = h;
      if(elM) elM.textContent = m;
      if(elS) elS.textContent = s;
    }
    tick();
    setInterval(tick, 1000);
  }

  async function loadPage(){
    var app = document.getElementById('app');
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');
    if(!slug){
      var pathParts = window.location.pathname.split('/').filter(Boolean);
      if(pathParts.length >= 2) slug = pathParts[pathParts.length - 1];
    }
    if(!slug){
      app.innerHTML = '<div class="error"><p>No invitation found.</p></div>';
      return;
    }

    try{
      var res = await fetch('https://wishify.onrender.com/api/pages/' + slug);
      var result = await res.json();
      if(!result.success){
        app.innerHTML = '<div class="error"><p>Invitation not found.</p></div>';
        return;
      }
      var d = result.page.data;
      if(d.audioUrl) initAudio(d.audioUrl);

      var bg1 = d.bgColor1 || '#1a0010';
      var bg2 = d.bgColor2 || '#0a0a0a';
      var accent = d.accentColor || '#d4af37';
      var cardColor = d.cardColor || '#140508';
      var dark = isColorDark(cardColor);
      var cardText = dark ? '#f6efe2' : '#1a0010';
      var cardSub = dark ? 'rgba(246,239,226,.72)' : 'rgba(20,5,8,.65)';

      document.documentElement.style.setProperty('--gold', accent);
      document.documentElement.style.setProperty('--bg1', bg1);
      document.documentElement.style.setProperty('--bg2', bg2);
      document.documentElement.style.setProperty('--card', cardColor);

      carouselPhotos = (d.photos || []).map(function(p){ return p.url; }).filter(Boolean);

      var bridePhotoHtml = d.bridePhotoUrl
        ? '<img class="couple-photo bride" src="' + d.bridePhotoUrl + '" alt="' + (d.brideName||'') + '"/>'
        : '<div class="couple-photo-empty">👰</div>';
      var groomPhotoHtml = d.groomPhotoUrl
        ? '<img class="couple-photo groom" src="' + d.groomPhotoUrl + '" alt="' + (d.groomName||'') + '"/>'
        : '<div class="couple-photo-empty">🤵</div>';

      var finalPhotoHtml = d.finalPhotoUrl ? '<img class="final-photo" src="' + d.finalPhotoUrl + '" alt="Couple"/>' : '';

      var countdownBg = d.countdownBgUrl || carouselPhotos[0] || '';
      var countdownStyle = countdownBg ? 'background-image:url(\'' + countdownBg + '\')' : 'background:linear-gradient(160deg,' + bg1 + ',' + bg2 + ')';

      app.innerHTML =
        '<div class="hero" style="background:linear-gradient(160deg,' + bg1 + ',' + bg2 + ')">' +
          '<div class="corner tl">' + cornerSVG + '</div><div class="corner tr">' + cornerSVG + '</div>' +
          '<div class="corner bl">' + cornerSVG + '</div><div class="corner br">' + cornerSVG + '</div>' +
          galleryOfPetals() +
          '<div class="eyebrow">You Are Cordially Invited</div>' +
          '<h1 class="hero-names serif">' + (d.brideName || 'Bride') + '<span class="amp">&amp;</span>' + (d.groomName || 'Groom') + '</h1>' +
          '<div class="hero-date">' + (d.weddingDate || '') + (d.weddingLocation ? ' · ' + d.weddingLocation : '') + '</div>' +
          '<p class="hero-msg">' + (d.welcomeMessage || 'Together with our families, we joyfully invite you to celebrate the beginning of our forever.') + '</p>' +
          '<span class="scroll-hint">↓ Scroll Down ↓</span>' +
        '</div>' +

        '<div class="section" style="background:' + bg2 + '">' +
          '<div class="section-head">' +
            '<div class="divider"><span class="line"></span><span class="diamond"></span><span class="line"></span></div>' +
            '<h2 class="serif">The Happy Couple</h2>' +
          '</div>' +
          '<div class="couple-wrap">' +
            '<div class="couple-person">' + bridePhotoHtml +
              '<h3 class="serif">' + (d.brideName || 'Bride') + '</h3>' +
              (d.brideParent ? '<div class="couple-parent">' + d.brideParent + '</div>' : '') +
              (d.brideTagline ? '<div class="couple-tagline">' + d.brideTagline + '</div>' : '') +
            '</div>' +
            '<div class="couple-person">' + groomPhotoHtml +
              '<h3 class="serif">' + (d.groomName || 'Groom') + '</h3>' +
              (d.groomParent ? '<div class="couple-parent">' + d.groomParent + '</div>' : '') +
              (d.groomTagline ? '<div class="couple-tagline">' + d.groomTagline + '</div>' : '') +
            '</div>' +
          '</div>' +
        '</div>' +

        '<div class="section" style="background:' + bg1 + '">' +
          '<div class="section-head">' +
            '<div class="divider"><span class="line"></span><span class="diamond"></span><span class="line"></span></div>' +
            '<h2 class="serif">Our Gallery</h2>' +
            '<p>A few frames from the story that brought us here.</p>' +
          '</div>' +
          '<div class="carousel">' +
            '<button class="car-arrow" onclick="carPrev()">‹</button>' +
            '<div class="car-track" id="car-track"></div>' +
            '<button class="car-arrow" onclick="carNext()">›</button>' +
          '</div>' +
          '<div class="car-dots" id="car-dots"></div>' +
        '</div>' +

        '<div class="countdown" style="' + countdownStyle + '">' +
          '<h2 class="serif">' + (d.countdownHeading || 'Counting Down To') + '</h2>' +
          '<div class="sub">' + (d.countdownSub || 'Our Special Day') + '</div>' +
          '<div class="cd-grid">' +
            '<div class="cd-box"><div class="num" id="cd-days">0</div><div class="lbl">Days</div></div>' +
            '<div class="cd-box"><div class="num" id="cd-hours">0</div><div class="lbl">Hours</div></div>' +
            '<div class="cd-box"><div class="num" id="cd-min">0</div><div class="lbl">Minutes</div></div>' +
            '<div class="cd-box"><div class="num" id="cd-sec">0</div><div class="lbl">Seconds</div></div>' +
          '</div>' +
        '</div>' +

        '<div class="section" style="background:' + bg1 + '">' +
          '<div class="section-head">' +
            '<div class="divider"><span class="line"></span><span class="diamond"></span><span class="line"></span></div>' +
            '<h2 class="serif">The Celebration</h2>' +
            '<p>We would be honoured to have you join us on our special day.</p>' +
          '</div>' +
          '<div class="events">' +
            '<div class="event-card" style="background:' + cardColor + ';color:' + cardText + '">' +
              '<div class="event-icon">💍</div><h3>' + (d.ceremonyTitle || 'The Ceremony') + '</h3>' +
              '<div class="event-row" style="color:' + cardSub + '"><b style="color:' + accent + '">' + (d.ceremonyDate || '') + '</b>' + (d.ceremonyTime || '') + '<br>' + (d.ceremonyVenue || '') + '<br>' + (d.ceremonyAddress || '') + '</div>' +
            '</div>' +
            '<div class="event-sep"></div>' +
            '<div class="event-card" style="background:' + cardColor + ';color:' + cardText + '">' +
              '<div class="event-icon">🥂</div><h3>' + (d.receptionTitle || 'The Reception') + '</h3>' +
              '<div class="event-row" style="color:' + cardSub + '"><b style="color:' + accent + '">' + (d.receptionDate || '') + '</b>' + (d.receptionTime || '') + '<br>' + (d.receptionVenue || '') + '<br>' + (d.receptionAddress || '') + '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +

        '<div class="final" style="background:linear-gradient(160deg,' + bg2 + ',' + bg1 + ')">' +
          '<div class="divider"><span class="line"></span><span class="diamond"></span><span class="line"></span></div>' +
          finalPhotoHtml +
          '<h2 class="serif">' + (d.finalHeading || 'With Love & Gratitude') + '</h2>' +
          '<p class="final-msg">' + (d.finalMessage || 'Your presence would mean the world to us as we begin this beautiful new chapter together. We can\'t wait to celebrate with you!') + '</p>' +
          '<p class="final-from serif">' + (d.finalFrom || (d.brideName||'') + ' &amp; ' + (d.groomName||'')) + '</p>' +
        '</div>' +

        '<div class="brand">Made with love · Wishify</div>';

      renderCarousel();
      resetAutoplay();
      if(d.countdownDateTime) startCountdown(d.countdownDateTime);

      var els = document.querySelectorAll('.section-head, .event-card, .couple-person');
      var io = new IntersectionObserver(function(entries){
        entries.forEach(function(e){ if(e.isIntersecting) e.target.classList.add('show'); });
      }, {threshold:.15});
      els.forEach(function(el){ el.classList.add('fade-up'); io.observe(el); });

    } catch(err){
      app.innerHTML = '<div class="error"><p>Could not load invitation. Is the server running?</p></div>';
    }
  }

  loadPage();
</script>
</body>
</html>
