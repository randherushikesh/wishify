<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>You're Invited</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,900;1,500;1,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg1, #fff0f5);color:#2c3e50;overflow-x:hidden;}
  .serif{font-family:'Playfair Display',serif;}

  /* --- GLASS ENVELOPE --- */
  .prev-envelope { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #ffe4e1; background-size: cover; background-position: center; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.9s cubic-bezier(0.77, 0, 0.175, 1); padding: 1.5rem;}
  .prev-envelope.opened { transform: translateY(-100%); }
  
  .glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 24px; padding: 3.5rem 2rem; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 480px; border: 1px solid rgba(255,255,255,0.6); }
  .env-to { font-size: 1rem; color: #333; margin-bottom: 0.5rem; font-weight: 600;}
  .env-names { font-size: clamp(2.2rem, 6vw, 3rem); color: var(--accent, #ff4d79); margin-bottom: 0.5rem; line-height: 1.2; }
  .env-date { font-size: 0.9rem; color: #555; margin-bottom: 1.5rem; }
  .env-msg { font-size: 0.9rem; color: var(--accent, #ff4d79); margin-bottom: 2.5rem; font-weight: 600; line-height: 1.5;}
  .env-btn { background: var(--accent, #ff4d79); color: #fff; padding: 1rem 3rem; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; box-shadow: 0 8px 20px rgba(0,0,0,0.15); transition: transform 0.2s;}
  .env-btn:hover { transform: translateY(-3px); }

  /* Audio Toggle */
  #audio-toggle { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; width: 45px; height: 45px; border-radius: 50%; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); color: var(--accent, #ff4d79); font-size: 1.2rem; cursor: pointer; display: none; align-items: center; justify-content: center; border: none; transition: transform 0.2s;}

  /* --- HERO OVERLAY --- */
  .prev-hero{position:relative;min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 1.4rem; background-color: #ffe4e1; background-size: cover; background-position: center; color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.4);}
  .prev-hero::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); z-index: 1;}
  .prev-hero > * { position: relative; z-index: 2; }
  .prev-names{font-size:clamp(3rem,8vw,5rem);font-weight:700;line-height:1.15;margin-bottom:1rem;}
  .prev-names .amp{font-style:italic;font-weight:500;padding:0 .2rem;}
  .prev-date{font-size:1.1rem; letter-spacing:.05em; font-weight:600;}

  /* --- SECTIONS --- */
  .prev-section{padding:5rem 1.4rem; text-align: center;}
  .prev-section h2{font-size:clamp(2rem,4vw,2.5rem);font-weight:700;margin-bottom:3rem; color: #2c3e50;}

  /* Couple Circular Photos */
  .prev-couple{display:flex;justify-content:center;gap:4rem;flex-wrap:wrap;}
  .prev-couple-person{max-width:250px;}
  .prev-couple-photo{width:200px;height:200px;border-radius:50%;margin:0 auto 1.5rem;object-fit:cover; border: 6px solid #fff; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display:none;}
  .prev-couple-person h3{font-size:1.6rem;font-weight:700;margin-bottom:.5rem; color: #2c3e50;}
  .prev-couple-parent{font-size:.9rem;color:#666;margin-bottom:.5rem;}

  /* --- 3D COVERFLOW GALLERY --- */
  .carousel-container { position: relative; width: 100%; height: 450px; perspective: 1000px; display: flex; justify-content: center; align-items: center; overflow: hidden;}
  .gallery-slide { position: absolute; width: 280px; height: 400px; border-radius: 16px; transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1); object-fit: cover; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 3px solid #fff; }
  
  .gallery-slide.center { transform: translateX(0) translateZ(0) rotateY(0); z-index: 3; opacity: 1; }
  .gallery-slide.left { transform: translateX(-65%) translateZ(-150px) rotateY(35deg); z-index: 2; opacity: 0.7; }
  .gallery-slide.right { transform: translateX(65%) translateZ(-150px) rotateY(-35deg); z-index: 2; opacity: 0.7; }
  .gallery-slide.hidden { transform: translateZ(-300px); z-index: 1; opacity: 0; pointer-events: none; }
  
  .carousel-controls { margin-top: 2rem; display: flex; justify-content: center; gap: 1.5rem; align-items: center;}
  .car-btn { background: #fff; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; color: var(--accent, #ff4d79); box-shadow: 0 5px 15px rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.2s;}
  .car-btn:hover { transform: scale(1.1); }
  .car-dots { display: flex; gap: 8px;}
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; transition: background 0.3s;}
  .dot.active { background: var(--accent, #ff4d79); transform: scale(1.3);}

  /* --- EVENT CARDS --- */
  .prev-section h2.event-title { font-size: clamp(1.8rem,4vw,2.2rem); margin-bottom: 3rem; color: #2c3e50; font-weight: 500; }
  .prev-events { max-width: 900px; margin: 0 auto; display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
  .prev-event-card { flex: 1 1 300px; max-width: 400px; background: var(--card, #ffffff); border-radius: 24px; padding: 3rem 2rem; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.04); border: none; }
  .card-icon-wrap { width: 65px; height: 65px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.06); color: var(--accent); }
  .card-icon-wrap svg { width: 28px; height: 28px; stroke: currentColor; stroke-width: 2; fill: none; }
  .prev-event-card h3 { font-size: 1.5rem; font-weight: 500; margin-bottom: 2rem; color: #2c3e50; }
  .event-detail-line { display: flex; align-items: flex-start; justify-content: center; gap: 0.8rem; font-size: 0.9rem; color: #555; margin-bottom: 1.2rem; line-height: 1.6; text-align: left; max-width: 250px; margin-left: auto; margin-right: auto;}
  .event-detail-line svg { width: 18px; height: 18px; stroke: var(--accent); flex-shrink: 0; margin-top: 3px; fill: none; stroke-width: 2; }
  .event-detail-line b { display: block; color: #333; font-weight: 700; margin-top: 0.5rem; font-size: 0.85rem;}

  /* Loading State */
  #loading-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 2000; display: flex; align-items: center; justify-content: center; color: #ff4d79; font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; transition: opacity 0.5s;}
</style>
</head>
<body>

<div id="loading-screen">Opening Invitation...</div>

<audio id="bg-music" loop preload="auto"></audio>
<button id="audio-toggle" onclick="toggleMute()">🔊</button>

<div id="preview-card" style="display:none;">
  
  <div class="prev-envelope" id="prev-envelope">
    <div class="glass-card">
      <svg style="width:50px; height:50px; margin-bottom:1rem;" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      <div class="env-to">The Wedding Of</div>
      <div class="env-names serif"><span id="env-bride"></span> <br>&amp;<br> <span id="env-groom"></span></div>
      <div class="env-date" id="env-date"></div>
      <div class="env-msg">Dear Guest,<br>You are invited to celebrate our special day</div>
      <button class="env-btn" id="open-btn">Open Invitation</button>
    </div>
  </div>

  <div class="prev-hero" id="prev-hero-bg">
    <svg style="width:60px; height:60px; stroke:#fff; margin-bottom:1rem;" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    <div style="font-size:1rem; margin-bottom:1rem; letter-spacing:0.1em; text-transform:uppercase;">The Wedding Celebration Of</div>
    <h1 class="prev-names serif"><span id="prev-bride"></span><span class="amp">&amp;</span><span id="prev-groom"></span></h1>
    <div class="prev-date" id="prev-date"></div>
  </div>

  <div class="prev-section">
    <h2 class="serif">The Happy Couple</h2>
    <div class="prev-couple">
      <div class="prev-couple-person">
        <img class="prev-couple-photo" id="prev-bride-photo" src="" alt="Bride"/>
        <h3 class="serif" id="prev-bride-2"></h3>
        <div class="prev-couple-parent" id="prev-bride-parent"></div>
      </div>
      <div class="prev-couple-person">
        <img class="prev-couple-photo" id="prev-groom-photo" src="" alt="Groom"/>
        <h3 class="serif" id="prev-groom-2"></h3>
        <div class="prev-couple-parent" id="prev-groom-parent"></div>
      </div>
    </div>
  </div>

  <div class="prev-section" id="gallery-section" style="display:none;">
    <h2 class="serif">Our Gallery</h2>
    <div class="carousel-container" id="dynamic-carousel">
      </div>
    <div class="carousel-controls">
      <button class="car-btn" onclick="moveGallery(-1)">❮</button>
      <div class="car-dots" id="car-dots"></div>
      <button class="car-btn" onclick="moveGallery(1)">❯</button>
    </div>
  </div>

  <div class="prev-section" id="prev-events-bg">
    <h2 class="serif event-title">Event Details</h2>
    <div class="prev-events">
      
      <div class="prev-event-card" id="card-ceremony">
        <div class="card-icon-wrap"><svg viewBox="0 0 24 24"><path d="M6 3h12l4 6-10 12L2 9z"></path></svg></div>
        <h3 class="serif" id="prev-ceremony-title"></h3>
        <div class="event-detail-line">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <div><span id="prev-ceremony-date"></span><br><b id="prev-ceremony-time"></b></div>
        </div>
        <div class="event-detail-line">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          <div><span id="prev-ceremony-venue"></span></div>
        </div>
      </div>

      <div class="prev-event-card" id="card-reception">
        <div class="card-icon-wrap"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></div>
        <h3 class="serif" id="prev-reception-title"></h3>
        <div class="event-detail-line">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <div><span id="prev-reception-date"></span><br><b id="prev-reception-time"></b></div>
        </div>
        <div class="event-detail-line">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          <div><span id="prev-reception-venue"></span></div>
        </div>
      </div>

      <div class="prev-event-card" id="card-wedding">
        <div class="card-icon-wrap">
          <svg viewBox="0 0 24 24"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>
        </div>
        <h3 class="serif w-title" id="prev-wedding-title">Wedding Ceremony</h3>
        
        <div class="event-detail-line">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <div><span class="w-event-date" id="prev-wedding-date">Tuesday, April 28, 2026</span><br><b class="w-event-time" id="prev-wedding-time">12:28 PM onwards</b></div>
        </div>
        
        <div class="event-detail-line">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          <div><span class="w-venue" id="prev-wedding-venue">Bhagwati Lawns, Kolhar-bableshwar road</span></div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
  let audioEl = document.getElementById('bg-music');
  let audioToggleBtn = document.getElementById('audio-toggle');
  let currIndex = 0;
  let totalSlides = 0;

  function toggleMute() {
    if (audioEl.muted) { audioEl.muted = false; audioToggleBtn.textContent = '🔊'; } 
    else { audioEl.muted = true; audioToggleBtn.textContent = '🔇'; }
  }

  // Envelope Open
  document.getElementById('open-btn').addEventListener('click', function() {
    document.getElementById('prev-envelope').classList.add('opened');
    if (audioEl.src && audioEl.src !== window.location.href) {
      audioEl.volume = 0.5;
      audioEl.play().catch(e => console.log('Audio blocked:', e));
    }
  });

  function setText(id, text) { let el = document.getElementById(id); if(el && text) el.textContent = text; }

  // 3D Carousel Logic
  function moveGallery(dir) {
    if(totalSlides === 0) return;
    currIndex = (currIndex + dir + totalSlides) % totalSlides;
    updateGalleryView();
  }

  function updateGalleryView() {
    const slides = document.querySelectorAll('.gallery-slide');
    const dots = document.querySelectorAll('.dot');
    
    slides.forEach((s, i) => {
      s.className = 'gallery-slide'; 
      if (i === currIndex) s.classList.add('center');
      else if (i === (currIndex - 1 + totalSlides) % totalSlides) s.classList.add('left');
      else if (i === (currIndex + 1) % totalSlides) s.classList.add('right');
      else s.classList.add('hidden');
    });

    dots.forEach((d, i) => {
      if(i === currIndex) d.classList.add('active');
      else d.classList.remove('active');
    });
  }

  async function loadInvitation() {
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');

    if (!slug) {
      var pathParts = window.location.pathname.split('/').filter(Boolean);
      if (pathParts.length >= 2) slug = pathParts[pathParts.length - 1]; 
    }

    if (!slug) {
      document.getElementById('loading-screen').textContent = 'Invitation not found.';
      return;
    }

    try {
      const res = await fetch('https://wishify.onrender.com/api/pages/' + slug);
      const result = await res.json();
      if (!result.success) throw new Error('Not found');

      const d = result.page.data;

      // Apply Colors
      let bg1 = d.bgColor1 || '#fff0f5';
      let acc = d.accentColor || '#ff4d79';
      document.documentElement.style.setProperty('--bg1', bg1);
      document.documentElement.style.setProperty('--accent', acc);

      // Hero Background
      if(d.heroBgUrl) {
        document.getElementById('prev-envelope').style.backgroundImage = `url('${d.heroBgUrl}')`;
        document.getElementById('prev-hero-bg').style.backgroundImage = `url('${d.heroBgUrl}')`;
      }

      // Text Mapping
      setText('env-bride', d.brideName); setText('env-groom', d.groomName); setText('env-date', d.weddingDate);
      setText('prev-bride', d.brideName); setText('prev-bride-2', d.brideName);
      setText('prev-groom', d.groomName); setText('prev-groom-2', d.groomName);
      setText('prev-date', d.weddingDate);
      setText('prev-bride-parent', d.brideParent); setText('prev-groom-parent', d.groomParent);

      // Map Event Details
      setText('prev-ceremony-title', d.ceremonyTitle); 
      setText('prev-ceremony-date', d.ceremonyDate);
      setText('prev-ceremony-time', d.ceremonyTime); 
      setText('prev-ceremony-venue', d.ceremonyVenue);

      setText('prev-reception-title', d.receptionTitle); 
      setText('prev-reception-date', d.receptionDate);
      setText('prev-reception-time', d.receptionTime); 
      setText('prev-reception-venue', d.receptionVenue);

      setText('prev-wedding-title', d.weddingTitle); 
      setText('prev-wedding-date', d.weddingDate);
      setText('prev-wedding-time', d.weddingTime); 
      setText('prev-wedding-venue', d.weddingVenue);

      // Photos
      if (d.bridePhotoUrl) { document.getElementById('prev-bride-photo').src = d.bridePhotoUrl; document.getElementById('prev-bride-photo').style.display = 'block'; }
      if (d.groomPhotoUrl) { document.getElementById('prev-groom-photo').src = d.groomPhotoUrl; document.getElementById('prev-groom-photo').style.display = 'block'; }

      // Build 3D Gallery
      if (d.photos && d.photos.length > 0) {
        let carousel = document.getElementById('dynamic-carousel');
        let dotsContainer = document.getElementById('car-dots');
        totalSlides = d.photos.length;
        
        d.photos.forEach((p, i) => {
          if (p.url) {
            carousel.innerHTML += `<img src="${p.url}" class="gallery-slide" />`;
            dotsContainer.innerHTML += `<div class="dot ${i === 0 ? 'active' : ''}"></div>`;
          }
        });
        document.getElementById('gallery-section').style.display = 'block';
        updateGalleryView();
      }

      // Audio
      if (d.audioUrl) { audioEl.src = d.audioUrl; audioToggleBtn.style.display = 'flex'; }

      document.getElementById('loading-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('preview-card').style.display = 'block';
      }, 500);

    } catch(err) {
      document.getElementById('loading-screen').textContent = 'Could not load your invitation.';
    }
  }
  loadInvitation();
</script>
</body>
</html>
